      const [form, setForm] = useState({ ...initialFilters, startDate: firstDayCurrentMonth });
      const [toast, setToast] = useState(null);
      const [approvalNote, setApprovalNote] = useState('');

      const isEmpMatch = (empId) => {
        if (!globalFilters) return true;
        const emp = dbEmployees.find(e => String(e.id) === String(empId));
        if (!emp) return true;

        if (globalFilters.colaboradorId && String(emp.id) !== String(globalFilters.colaboradorId)) return false;

        if (globalFilters.gestorId) {
          const subordinateIds = [parseInt(globalFilters.gestorId), ...getSubordinateIds(dbEmployees, globalFilters.gestorId)];
          if (!subordinateIds.includes(parseInt(emp.id))) return false;
        } else if (globalFilters.gestor) {
          if (emp.areaNome !== globalFilters.gestor && emp.manager !== globalFilters.gestor) return false;
        }

        if (globalFilters.cargo && emp.teamStr !== globalFilters.cargo && emp.team !== globalFilters.cargo && emp.cargoNome !== globalFilters.cargo) return false;
        return true;
      };

      const filteredTasks = useMemo(() => {
        if (!tasks) return [];
        return tasks.filter(t => isEmpMatch(t.ownerId));
      }, [tasks, dbEmployees, globalFilters, getSubordinateIds]);

      const handleLogin = (user, token) => {
        console.log('🔐 handleLogin chamado com email:', user.email);
        // Achatar o objeto user para compatibilidade com o frontend
        const flattenedUser = {
          ...user,
          colaboradorId: user.colaborador?.id,
          nome: user.colaborador?.nome,
          cargo: user.colaborador?.cargo,
          nivelHierarquia: user.colaborador?.nivel,
          nivelDescricao: user.colaborador?.nivelDescricao,
          color: user.colaborador?.color,
          avatarUrl: user.colaborador?.avatarUrl,
          gestor: user.colaborador?.gestor,
          tpContrato: user.colaborador?.tpContrato
        };
        
        console.log('💾 Salvando no sessionStorage');
        sessionStorage.setItem('gbi_user', JSON.stringify(flattenedUser));
        sessionStorage.setItem('gbi_token', token);
        console.log('📝 Atualizando estado (currentUser, authToken)');
        setCurrentUser(flattenedUser);
        setAuthToken(token);
      };
      const handleLogout = () => {
        if (window.confirm('Você tem certeza que deseja sair do sistema?')) {
          sessionStorage.removeItem('gbi_user');
          sessionStorage.removeItem('gbi_token');
          setCurrentUser(null);
          setAuthToken(null);
        }
      };

      const refreshEmployees = useCallback(async () => {
        try {
          const res = await fetch(`${API_BASE}/api/employees`);
          const data = await res.json();
          const validData = (data || []).filter(e => e && e.id);
          if (validData.length) {
            employees.length = 0;
            employees.push(...validData);
            setDbEmployees([...validData]);
          }
        } catch (e) { console.error(e); }
      }, []);

      useEffect(() => {
        console.log('🚀 useEffect de carregamento acionado | currentUser:', currentUser?.email || 'null', 'authToken:', authToken ? 'SIM' : 'NÃO');
        const token = authToken;
        if (!token && !currentUser) {
          console.log('⚠️ Sem token e sem currentUser - retornando');
          setLoading(false);
          return;
        }
        console.log('📡 Iniciando carregamento de dados...');
        setLoading(true);

        const pEmployees = fetch(`${API_BASE}/api/employees`)
          .then(res => {
            console.log('📦 /api/employees retornou status:', res.status);
            return res.json();
          })
          .then(data => {
            console.log('✅ Employees carregados:', data?.length || 0, 'itens');
            const validData = (data || []).filter(e => e && e.id);
            if (validData.length) {
              employees.length = 0;
              employees.push(...validData);
              setDbEmployees([...validData]);
              const initialEmpId = currentUser && !currentUser.isAdmin ? currentUser.colaboradorId : (validData[0] ? validData[0].id : '');
              setForm(f => ({ ...f, employeeId: String(initialEmpId) }));
            }
          })
          .catch(err => console.error('❌ Erro ao carregar employees:', err.message));

        const pTasks = fetch(`${API_BASE}/api/tasks`)
          .then(res => res.json())
          .then(data => {
            if (data && Array.isArray(data)) {
               setTasks(data.map(t => ({
                ...t, id: t.Id || t.id, ownerId: t.OwnerId || t.ownerId,
                status: t.Status || t.status, priority: t.Priority || t.priority,
                title: t.Title || t.title,
                startDate: (t.StartDate || t.startDate) ? (t.StartDate || t.startDate).slice(0, 10) : '',
                endDate: (t.EndDate || t.endDate) ? (t.EndDate || t.endDate).slice(0, 10) : '',
                demandaId: t.DemandaId || t.demandaId || null
              })));
            } else {
               setTasks([]);
               console.warn('Tasks API did not return an array');
            }
          });

        const pRequests = fetch(`${API_BASE}/api/requests`)
          .then(res => res.json())
          .then(data => {
            if (data && data.length) {
              setRequests(data);
              const initialWorkDays = {};
              data.forEach(r => {
                if (r.type === 'Escala de Trabalho' && r.localTrabalho) {
                  if (!initialWorkDays[r.employeeId]) initialWorkDays[r.employeeId] = {};
                  initialWorkDays[r.employeeId][r.startDate] = r.localTrabalho;
                }
              });
              setWorkDays(initialWorkDays);
            }
          });

        const pAreas = fetch(`${API_BASE}/api/areas`)
          .then(res => res.json())
          .then(data => setAreas(data || []));

        const pCargos = fetch(`${API_BASE}/api/cargos`, { headers: apiHeaders(authToken) })
          .then(res => res.json())
          .then(data => setCargos(data || []));

        const pDemandas = fetch(`${API_BASE}/api/demandas`)
          .then(res => res.json())
          .then(data => {
             if (Array.isArray(data)) setDemandas(data);
             else {
               setDemandas([]);
               console.warn('Demandas API did not return an array', data);
             }
          });

        Promise.all([pEmployees, pTasks, pRequests, pAreas, pCargos, pDemandas]).finally(() => {
          console.log('✅ Promise.all finalizado - setando loading = false');
          setLoading(false);
        });
      }, [authToken, currentUser]);

      // Enforce owner identity for non-admins
      useEffect(() => {
        if (currentUser && !currentUser.isAdmin && currentUser.colaboradorId) {
          const colabId = String(currentUser.colaboradorId);
          // Forçar ID no formulário de agendamento
          if (form.employeeId !== colabId) {
            setForm(f => ({ ...f, employeeId: colabId }));
          }
        }
      }, [currentUser]);

      useEffect(() => {
        if (!toast) return undefined;
        const timer = setTimeout(() => setToast(null), 3800);
        return () => clearTimeout(timer);
      }, [toast]);

      const detailedRequests = useMemo(
        () => {
          if (!requests || !Array.isArray(requests)) return [];

          let filtered = requests;
          if (globalFilters.gestorId) {
            const subordinateIds = [parseInt(globalFilters.gestorId), ...getSubordinateIds(dbEmployees, globalFilters.gestorId)];
            filtered = filtered.filter(r => subordinateIds.includes(parseInt(r.employeeId)));
          }

          return filtered.map(buildRequestDetails).sort((a, b) => new Date(a.startDate || 0) - new Date(b.startDate || 0));
        },
        [requests, dbEmployees, globalFilters.gestorId]
      );

      const pendingRequests = useMemo(() => {
        const list = detailedRequests.filter(r => r.status === 'Pendente');
        if (currentUser && !currentUser.isAdmin) {
          const subordinates = [currentUser.colaboradorId, ...getSubordinateIds(dbEmployees, currentUser.colaboradorId)];
          return list.filter(r => subordinates.includes(Number(r.employeeId)));
        }
        return list;
      }, [detailedRequests, currentUser, dbEmployees, getSubordinateIds]);

      const approvedRequests = useMemo(() => {
        const list = detailedRequests.filter(r => r.status === 'Aprovado');
        if (currentUser && !currentUser.isAdmin) {
          const subordinates = [currentUser.colaboradorId, ...getSubordinateIds(dbEmployees, currentUser.colaboradorId)];
          return list.filter(r => subordinates.includes(Number(r.employeeId)));
        }
        return list;
      }, [detailedRequests, currentUser, dbEmployees, getSubordinateIds]);

      const rejectedRequests = useMemo(() => {
        const list = detailedRequests.filter(r => r.status === 'Rejeitado');
        if (currentUser && !currentUser.isAdmin) {
          const subordinates = [currentUser.colaboradorId, ...getSubordinateIds(dbEmployees, currentUser.colaboradorId)];
          return list.filter(r => subordinates.includes(Number(r.employeeId)));
        }
        return list;
      }, [detailedRequests, currentUser, dbEmployees, getSubordinateIds]);


      const formEmployee = getEmployeeById(form.employeeId);
      const selectedDuration = form.startDate && form.endDate && toDate(form.endDate) >= toDate(form.startDate)
        ? diffDays(form.startDate, form.endDate)
        : 0;

      const formConflicts = useMemo(() => {
        if (!form.startDate || !form.endDate || !formEmployee) return [];

        return detailedRequests.filter((request) => {
          if (!request || request.status === 'Rejeitado') return false;
          if (request.employeeId === formEmployee.id) return false;
          if (request.employee?.team !== formEmployee?.team) return false;
          return rangesOverlap(form.startDate, form.endDate, request.startDate, request.endDate);
        });
      }, [detailedRequests, form.startDate, form.endDate, formEmployee]);

      const formConflictLevel = getConflictLevel(formConflicts);

      const stats = useMemo(() => {
        const defaultStats = { totalRequests: 0, pending: 0, approvedDays: 0, concurrentApril: 0, highRiskPending: 0 };
        if (!detailedRequests) return defaultStats;

        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth();
        const firstDay = `${y}-${String(m + 1).padStart(2, '0')}-01`;
        const lastDay = `${y}-${String(m + 1).padStart(2, '0')}-${new Date(y, m + 1, 0).getDate()}`;

        const validApproved = (approvedRequests || []).filter(r => r && r.totalDays != null);
        const totalDaysApproved = validApproved.reduce((acc, request) => acc + (request.totalDays || 0), 0);

        const totalTeamMembersOnLeave = new Set(
          (approvedRequests || [])
            .filter((request) => request && rangesOverlap(firstDay, lastDay, request.startDate, request.endDate))
            .map((request) => request.employeeId)
        ).size;

        const highRiskPendingCount = (pendingRequests || []).filter((request) => {
          if (!request || !request.employee) return false;
          const sameTeamApproved = (approvedRequests || []).filter((approved) => approved && approved.employee?.team === request.employee?.team);
          const conflicts = sameTeamApproved.filter((approved) =>
            rangesOverlap(request.startDate, request.endDate, approved.startDate, approved.endDate)
          );
          return conflicts.length >= 1;
        }).length;

        return {
          totalRequests: detailedRequests.length || 0,
          pending: pendingRequests.length || 0,
          approvedDays: totalDaysApproved || 0,
          concurrentApril: totalTeamMembersOnLeave || 0,
          highRiskPending: highRiskPendingCount || 0
        };
      }, [approvedRequests, detailedRequests, pendingRequests]);

      const timelineItems = useMemo(() => {
        return (detailedRequests || []).slice(0, 5).map((request) => {
          if (!request) return null;
          const conflictCount = detailedRequests.filter((item) => {
            if (!item || item.id === request.id) return false;
            if (item.employee?.team !== request.employee?.team) return false;
            if (item.status === 'Rejeitado') return false;
            return rangesOverlap(item.startDate, item.endDate, request.startDate, request.endDate);
          }).length;

          return {
            ...request,
            conflictCount,
            label: conflictCount > 0 ? `Conflito com ${conflictCount} colaborador(es)` : 'Sem conflito relevante'
          };
        }).filter(Boolean);
      }, [detailedRequests]);

      const currentMonth = useMemo(() => toDate(form.startDate || firstDayCurrentMonth), [form.startDate, firstDayCurrentMonth]);
      const monthDays = useMemo(() => getMonthMatrix(currentMonth), [currentMonth]);

      const submitRequest = () => {
        if (!form.employeeId || !form.startDate || !form.endDate || !form.type) {
          setToast({ title: 'Campos obrigatórios', message: 'Preencha colaborador, tipo e período antes de enviar.' });
          return;
        }

        if (toDate(form.endDate) < toDate(form.startDate)) {
          setToast({ title: 'Período inválido', message: 'A data final precisa ser igual ou posterior à data inicial.' });
          return;
        }

        const empId = Number(form.employeeId);
        if (!currentUser.isAdmin && currentUser.colaboradorId !== empId) {
          setToast({ title: 'Acesso negado', message: 'Você só pode criar agendamentos para si mesmo.' });
          return;
        }

        const newRequest = {
          employeeId: Number(form.employeeId),
          startDate: form.startDate,
          endDate: form.endDate,
          type: form.type,
          status: 'Pendente',
          note: form.note || 'Sem observações adicionais.',
          coverage: form.coverage || 'A definir',
          priority: formConflicts.length >= 2 ? 'Alta' : formConflicts.length === 1 ? 'Média' : 'Baixa'
        };

        fetch(`${API_BASE}/api/requests`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newRequest)
        })
          .then(res => res.json())
          .then(data => {
            setRequests((current) => [...current, data]);
            setToast({
              title: 'Solicitação enviada',
              message: formConflicts.length
                ? `Pedido criado com ${formConflicts.length} conflito(s) na mesma equipe para análise do gestor.`
                : 'Pedido criado sem conflitos diretos na equipe.'
            });
            setActiveView('approvals');
          })
          .catch(err => console.error('Failed to create Request', err));
      };

      const handleApproval = (requestId, decision) => {
        // Regra: apenas isAdmin OU colaborador com nível hierárquico MENOR (mais alto na hierarquia) pode aprovar
        if (!currentUser.isAdmin) {
          const req = detailedRequests.find(r => r.id === requestId);
          if (req && req.employee) {
            const solicitanteNivel = req.employee.nivelHierarquia || 6;
            const aprovadorNivel = currentUser.nivelHierarquia;
            // Aprovador precisa ter número de nível MENOR que o solicitante
            if (!aprovadorNivel || aprovadorNivel >= solicitanteNivel) {
              setToast({ title: 'Sem permissão', message: `Seu nível hierárquico (N${aprovadorNivel || '?'}) não permite aprovar solicitações de colaboradores do mesmo nível ou superior (N${solicitanteNivel}).` });
              return;
            }
          }
        }
        fetch(`${API_BASE}/api/requests/${requestId}`, {
          method: 'PUT',
          headers: apiHeaders(authToken),
          body: JSON.stringify({
            status: decision,
            aprovadorId: currentUser.colaboradorId,
            aprovadorNivel: currentUser.nivelHierarquia
          })
        })
          .then(() => {
            setRequests(current =>
              current.map(request =>
                request.id === requestId
                  ? {
                    ...request, status: decision,
                    note: approvalNote ? `${request.note} | Parecer: ${approvalNote}` : request.note
                  }
                  : request
              )
            );
            setToast({
              title: decision === 'Aprovado' ? 'Solicitação aprovada' : 'Solicitação rejeitada',
              message: decision === 'Aprovado'
                ? 'O colaborador já pode visualizar o status aprovado no resumo principal.'
                : 'O colaborador deverá ajustar o período e reenviar uma nova solicitação.'
            });
            setApprovalNote('');
          })
          .catch(err => console.error('Failed to update Request', err));
      };

      if (!currentUser) {
        return (
          <div style={{ minHeight: '100vh' }}>
            {isLocalFile && (
              <div className="file-warning">
                <span className="material-symbols-outlined">warning</span>
                <div>
                  <strong>Atenção:</strong> Você abriu o arquivo localmente. Para o login e avatares funcionarem, acesse via <u>http://localhost:3000/gestaoavista.html</u>
                </div>
              </div>
            )}
            <LoginModal onLogin={handleLogin} />
          </div>
        );
      }

      if (loading) {
        return (
          <div style={{ background: '#0f172a', height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: '#fff', gap: '20px' }}>
            <div className="modern-spinner"></div>
            <div style={{ fontSize: '1.2rem', fontWeight: 600, letterSpacing: '1px' }}>CONTROLLER MAESTRO</div>
          </div>
        );
      }

      return (
        <div className="app-container">
          <div className={`sidebar-overlay ${isSidebarOpen ? 'open' : ''}`} onClick={() => setIsSidebarOpen(false)}></div>
          {showSettings && (
            <SettingsModal
              currentUser={currentUser}
              authToken={authToken}
              onClose={() => setShowSettings(false)}
              onProfileUpdate={(newAvatarUrl) => {
                const updated = { ...currentUser, avatarUrl: newAvatarUrl };
                setCurrentUser(updated);
                sessionStorage.setItem('gbi_user', JSON.stringify(updated));
                setShowSettings(false);
                setActiveView('dashboard');
              }}
              refreshEmployees={refreshEmployees}
            />
          )}

          <div className="app-shell">
            <aside className={`sidebar ${isSidebarOpen ? 'open' : ''}`}>
              <div className="brand">
                <div className="brand-badge">📊</div>
                <div>
                  <h1>GESTÃO À VISTA</h1>
                  <p>Superintendência de Finanças</p>
                </div>
              </div>

              <nav className="nav-list">
                {(views || []).map((view) => (
                  <button
                    key={view.id}
                    className={`nav-button ${activeView === view.id ? 'active' : ''}`}
                    onClick={() => {
                      setActiveView(view.id);
                      setIsSidebarOpen(false);
                    }}
                  >
                    <span className="material-symbols-outlined">{view.icon}</span>
                    <div>
                      <span className="nav-title">{view.title}</span>
                      <span className="nav-caption">{view.caption}</span>
                    </div>
                  </button>
                ))}
              </nav>

              {/* Botão de alternancia de tema */}
              <button
                onClick={() => setIsDark(d => !d)}
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '10px',
                  width: '100%',
                  padding: '10px 16px',
                  margin: '12px 0 4px',
                  background: isDark ? 'rgba(51,204,204,0.08)' : 'rgba(0,0,0,0.04)',
                  border: '1px solid var(--line)',
                  borderRadius: '12px',
                  color: 'var(--text)',
                  cursor: 'pointer',
                  fontSize: '.84rem',
                  fontWeight: 600,
                  transition: 'all .2s',
                  flexShrink: 0,
                }}
                title={isDark ? 'Mudar para modo claro' : 'Mudar para modo escuro'}
              >
                <span className="material-symbols-outlined" style={{ fontSize: '18px', color: isDark ? '#f59e0b' : 'var(--muted)' }}>
                  {isDark ? 'light_mode' : 'dark_mode'}
                </span>
                <span>{isDark ? 'Modo Claro' : 'Modo Escuro'}</span>
                <span style={{
                  marginLeft: 'auto',
                  width: '36px', height: '20px',
                  background: isDark ? 'var(--primary)' : 'var(--line)',
                  borderRadius: '10px',
                  position: 'relative',
                  transition: 'background .25s',
                  flexShrink: 0
                }}>
                  <span style={{
                    position: 'absolute',
                    top: '2px',
                    left: isDark ? '18px' : '2px',
                    width: '16px', height: '16px',
                    background: '#fff',
                    borderRadius: '50%',
                    transition: 'left .25s cubic-bezier(.4,0,.2,1)',
                    boxShadow: '0 1px 4px rgba(0,0,0,0.3)'
                  }} />
                </span>
              </button>

              <div className="user-badge">
                <div className="user-badge-content" onClick={() => setShowSettings(true)} style={{ cursor: 'pointer' }}>
                  {currentUser.avatarUrl ? (
                    <img src={currentUser.avatarUrl} style={{ width: '32px', height: '32px', borderRadius: '10px', objectFit: 'cover', border: '1px solid var(--line)' }} />
                  ) : (
                    <div className="user-badge-avatar" style={{ background: currentUser.color || 'var(--primary)' }}>
                      {(currentUser.name || currentUser.nome || 'A').charAt(0)}
                    </div>
                  )}
                  <div className="user-badge-info">
                    <div className="user-badge-name">{currentUser.name || currentUser.nome || 'Administrador'}</div>
                    <div className="user-badge-role">{currentUser.isAdmin ? 'Administrador' : (currentUser.nivelDescricao || 'Usuário')}</div>
                  </div>
                  <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--muted)' }}>settings</span>
                </div>
                <button
                  className="logout-btn"
                  onClick={(e) => { e.stopPropagation(); handleLogout(); }}
                >
                  <span className="material-symbols-outlined" style={{ fontSize: '16px' }}>logout</span> Sair
                </button>
              </div>
            </aside>

            <main className="main-content">
              <div className="topbar-header" style={{ marginBottom: '16px' }}>
                <button className="menu-toggle" onClick={() => setIsSidebarOpen(true)}>
                  <span className="material-symbols-outlined">menu</span>
                </button>
              </div>
              {(activeView === 'dashboard' || activeView === 'tasks' || activeView === 'scale') && (
                <div className="top-filters">
                  <div className="filter-group" style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--muted)' }}>person</span>
                    <label>Colaborador:</label>
                    <select value={globalFilters.colaboradorId} onChange={e => setGlobalFilters(f => ({ ...f, colaboradorId: e.target.value }))}>
                      <option value="">Todos os membros</option>
                      {(dbEmployees || []).map(e => <option key={e.id} value={String(e.id)}>{e.name.split(' ')[0]} {e.name.split(' ').pop()}</option>)}
                    </select>
                  </div>
                  <div className="filter-group" style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--muted)' }}>domain</span>
                    <label>Área Executiva:</label>
                    <select value={globalFilters.gestor} onChange={e => setGlobalFilters(f => ({ ...f, gestor: e.target.value }))}>
                      <option value="">Todas as áreas</option>
                      {(areas || []).map(a => <option key={a.id} value={a.nome}>{a.nome}</option>)}
                    </select>
                  </div>
                  <div className="filter-group" style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--muted)' }}>supervisor_account</span>
                    <label>Gestor:</label>
                    <select value={globalFilters.gestorId} onChange={e => setGlobalFilters(f => ({ ...f, gestorId: e.target.value }))}>
                      <option value="">Todos os gestores</option>
                      {(dbEmployees || []).filter(e => e.nivelHierarquia <= 4 || (dbEmployees || []).some(sub => String(sub.gestorId) === String(e.id))).map(g => (
                        <option key={g.id} value={String(g.id)}>{g.name}</option>
                      ))}
                    </select>
                  </div>
                  {(globalFilters.colaboradorId || globalFilters.gestor || globalFilters.gestorId) && (
                    <button
                      onClick={() => setGlobalFilters({ gestor: '', colaboradorId: '', gestorId: '' })}
                      style={{ display: 'flex', alignItems: 'center', gap: '4px', background: 'transparent', border: '1px solid var(--line)', borderRadius: '20px', padding: '4px 10px', cursor: 'pointer', fontSize: '.75rem', color: 'var(--muted)' }}
                    >
                      <span className="material-symbols-outlined" style={{ fontSize: '14px' }}>close</span>
                      Limpar
                    </button>
                  )}
                </div>
              )}

              {activeView === 'dashboard' && (
                <DashboardView
                  stats={stats}
                  requests={detailedRequests}
                  pendingRequests={pendingRequests}
                  rejectedRequests={rejectedRequests}
                  timelineItems={timelineItems}
                  tasks={filteredTasks}
                  workDays={workDays}
                  employees={dbEmployees}
                  demandas={demandas}
                  setDemandas={setDemandas}
                  globalFilters={globalFilters}
                />
              )}

              {activeView === 'requests' && (
                <RequestView
                  form={form}
                  setForm={setForm}
                  employees={dbEmployees}
                  requests={detailedRequests}
                  formEmployee={formEmployee}
                  formConflicts={formConflicts}
                  formConflictLevel={formConflictLevel}
                  selectedDuration={selectedDuration}
                  submitRequest={submitRequest}
                  currentUser={currentUser}
                />
              )}

              {activeView === 'tasks' && (
                <TaskView
                  tasks={filteredTasks}
                  setTasks={setTasks}
                  employees={dbEmployees}
                  requests={detailedRequests}
                  currentUser={currentUser}
                  demandas={demandas}
                  setDemandas={setDemandas}
                  authToken={authToken}
                  globalFilters={globalFilters}
                />
              )}

              {activeView === 'approvals' && (
                <ApprovalView
                  pendingRequests={pendingRequests}
                  allRequests={detailedRequests}
                  approvalNote={approvalNote}
                  setApprovalNote={setApprovalNote}
                  handleApproval={handleApproval}
                  currentUser={currentUser}
                />
              )}

              {activeView === 'scale' && (
                <ScaleView
                  currentMonth={currentMonth}
                  monthDays={monthDays}
                  workDays={workDays}
                  setWorkDays={setWorkDays}
                  requests={requests}
                  setRequests={setRequests}
                  currentUser={currentUser}
                  authToken={authToken}
                  globalFilters={globalFilters}
                />
              )}

            </main>
          </div> </div>
      );
    }

    function TaskView({ tasks, setTasks, employees: initialEmployees, requests, demandas, setDemandas, currentUser, authToken, globalFilters }) {
      const [dbEmployees, setDbEmployees] = useState(initialEmployees || []);
      const holidays = useMemo(() => getBrazilianHolidays(2026), []);
      const [statusModal, setStatusModal] = useState(null); // {taskId, newStatus, oldStatus}
      const [statusComment, setStatusComment] = useState('');
      const [demandaModal, setDemandaModal] = useState(null); // { id, titulo, responsavelId, inicioPlanjado, fimPlanejado }

      // Novos filtros locais
      const [taskStatusFilter, setTaskStatusFilter] = useState('');
      const [taskResponsibleFilter, setTaskResponsibleFilter] = useState('');
      const [localDemandaStatusFilter, setLocalDemandaStatusFilter] = useState('');
      const [demandaResponsibleFilter, setDemandaResponsibleFilter] = useState('');

      // Largura das colunas (não persistente conforme solicitado)
      // Largura das colunas (otimizadas para 100% da tela sem scroll)
      const [taskColWidths, setTaskColWidths] = useState({ title: 180, demanda: 140, owner: 140, priority: 90, status: 100, dates: 160, actions: 50 });
      const [demandColWidths, setDemandColWidths] = useState({ title: 220, owner: 140, status: 100, priority: 90, progress: 120, dates: 160, actions: 80 });
      
      // Tamanho do modal dinâmico
      const [modalSize, setModalSize] = useState({ width: 800, height: 600 });


      useEffect(() => {
        fetch(`${API_BASE}/api/employees`, { headers: apiHeaders(authToken) })
          .then(res => res.json())
          .then(data => setDbEmployees(data || []))
          .catch(err => console.error('Failed to fetch employees in TaskView', err));
      }, [authToken]);

      const getSubordinateIds = useCallback((allEmps, managerId) => {
        const direct = allEmps.filter(e => String(e.gestorId) === String(managerId));
        let ids = direct.map(e => e.id);
        direct.forEach(sub => {
          ids = [...ids, ...getSubordinateIds(allEmps, sub.id)];
        });
        return Array.from(new Set(ids));
      }, []);

      const filteredTasks = useMemo(() => {
        if (!tasks) return [];
        
        let list = tasks;

        // Filtros locais (Avançados)
        if (taskStatusFilter) list = list.filter(t => t.status === taskStatusFilter);
        if (taskResponsibleFilter) list = list.filter(t => String(t.ownerId) === String(taskResponsibleFilter));

        if (!globalFilters) return list;

        return list.filter(task => {
          const emp = dbEmployees?.find(e => String(e.id) === String(task.ownerId));
          if (!emp) return true;

          // Filter by Colaborador
          if (globalFilters.colaboradorId && String(emp.id) !== String(globalFilters.colaboradorId)) return false;

          // Filter by Gestor (Hierarchy)
          if (globalFilters.gestorId) {
            const subordinateIds = [parseInt(globalFilters.gestorId), ...getSubordinateIds(dbEmployees, globalFilters.gestorId)];
            if (!subordinateIds.includes(parseInt(emp.id))) return false;
          } else if (globalFilters.gestor) {
            if (emp.areaNome !== globalFilters.gestor && emp.manager !== globalFilters.gestor) return false;
          }

          // Filter by Cargo/Team
          if (globalFilters.cargo && emp.teamStr !== globalFilters.cargo && emp.team !== globalFilters.cargo && emp.cargoNome !== globalFilters.cargo) return false;

          return true;
        });
      }, [tasks, dbEmployees, globalFilters, getSubordinateIds, taskStatusFilter, taskResponsibleFilter]);


      const statuses = ['Não Iniciado', 'Em Andamento', 'Concluído', 'Pausado', 'Bloqueio', 'Cancelado'];
      const priorities = ['Baixa', 'Média', 'Alta', 'Crítica'];
      const demandStatuses = ['Não Iniciado', 'Em Andamento', 'Concluído', 'Pausado', 'Bloqueio', 'Cancelado'];

      const cycleValue = (current, array) => {
        const idx = array.indexOf(current);
        return array[(idx + 1) % array.length];
      };

      const syncTask = (task) => {
        // Se a tarefa tem ID real (positivo), faz o UPDATE (PUT)
        if (task.id && task.id > 0) {
          const payload = { title: task.title, ownerId: task.ownerId, status: task.status, priority: task.priority, startDate: task.startDate, endDate: task.endDate, demandaId: task.demandaId || null };
          fetch(`${API_BASE}/api/tasks/${task.id}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json', ...apiHeaders(authToken) }, body: JSON.stringify(payload)
          }).catch(err => console.log('Sync error (PUT)', err));
        } 
        // Se a tarefa tem ID temporário (negativo) e agora tem DEMANDA, faz o CREATE (POST)
        else if (task.id && task.id < 0 && task.demandaId) {
          const payload = { title: task.title, ownerId: task.ownerId, status: task.status, priority: task.priority, startDate: task.startDate, endDate: task.endDate, demandaId: task.demandaId };
          fetch(`${API_BASE}/api/tasks`, {
            method: 'POST', headers: { 'Content-Type': 'application/json', ...apiHeaders(authToken) }, body: JSON.stringify(payload)
          })
          .then(res => res.json())
          .then(data => {
            if (data?.id) {
               // Promove o ID temporário para o ID real retornado pelo servidor
               setTasks(prev => prev.map(t => t.id === task.id ? { ...t, id: data.id } : t));
            }
          })
          .catch(err => console.log('Sync error (POST)', err));
        }
      };

      const updateTask = (id, field, value) => {
        let updatedTask = null;
        setTasks(prev => {
          const next = prev.map(t => {
            if (t.id === id) {
              updatedTask = { ...t, [field]: value };
              return updatedTask;
            }
            return t;
          });
          return next;
        });

        // Use a slight timeout to send the updated state values (especially important for async render)
        setTimeout(() => {
          setTasks(current => {
            const t = current.find(x => x.id === id);
            if (t && (field === 'status' || field === 'priority' || field === 'startDate' || field === 'endDate' || field === 'title' || field === 'ownerId')) {
              syncTask(t);
            }
            return current;
          });
        }, 100);
      };

      const deleteTask = (id) => {
        if (!confirm('Deseja realmente excluir esta tarefa?')) return;
        // IDs negativos são temporários — remover só do estado local, sem chamar API
        if (!id || id < 0) {
          setTasks(current => current.filter(t => t.id !== id));
          return;
        }
        fetch(`${API_BASE}/api/tasks/${id}`, {
          method: 'DELETE',
          headers: apiHeaders(authToken)
        })
          .then(() => {
            setTasks(current => current.filter(t => t.id !== id));
          })
          .catch(err => {
            console.error('Failed to delete task', err);
            // Remove localmente mesmo assim para não deixar tarefa órfã na UI
            setTasks(current => current.filter(t => t.id !== id));
          });
      };

      const getStatusClass = (status) => {
        if (status === 'Concluído') return 'done';
        if (status === 'Em Andamento') return 'working';
        if (status === 'Bloqueio') return 'stuck';
        if (status === 'Pausado') return 'stuck';
        if (status === 'Cancelado') return 'rejected';
        return 'not-started';
      };

      const getPriorityClass = (priority) => {
        if (priority === 'Crítica') return 'critical';
        if (priority === 'Alta') return 'high';
        if (priority === 'Média') return 'medium';
        return 'low';
      };

      const calculateAvailableDays = (ownerId, start, end) => {
        if (!start || !end) return 0;
        let count = 0;
        let currentDate = new Date(start + 'T12:00:00');
        const endDateObj = new Date(end + 'T12:00:00');

        while (currentDate <= endDateObj) {
          const dateKey = currentDate.toISOString().slice(0, 10);
          const isWeekend = currentDate.getDay() === 0 || currentDate.getDay() === 6;

          if (!isWeekend && !holidays[dateKey]) {
            const hasAbsence = requests.some(r => {
              if (r.employeeId !== ownerId) return false;
              if (r.status === 'Rejeitado') return false;
              if (!['Férias integrais', 'Férias fracionadas', 'Day-off', 'Saúde (Exames/Consultas)'].includes(r.type)) return false;
              return isWithinRange(dateKey, r.startDate, r.endDate);
            });
            if (!hasAbsence) count++;
          }
          currentDate.setDate(currentDate.getDate() + 1);
        }
        return count;
      };

      const [showGantt, setShowGantt] = useState(false);
      const [ganttScale, setGanttScale] = useState('month');
      const [ganttBaseDate, setGanttBaseDate] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`;
      });
      const [selectedDemandaId, setSelectedDemandaId] = useState(null);
      const [demandaStatusFilter, setDemandaStatusFilter] = useState('');

      const filteredDemandas = useMemo(() => {
        if (!demandas) return [];
        
        // Filtros locais (Avançados)
        let list = demandas;
        if (localDemandaStatusFilter) list = list.filter(d => (d.Status || d.status) === localDemandaStatusFilter);
        if (demandaResponsibleFilter) list = list.filter(d => String(d.responsavelId || d.ResponsavelId) === String(demandaResponsibleFilter));

        return list.filter(d => {
          if (!globalFilters) return true;
          
          // Filter by gestorId (full hierarchy: manager + all recursive subordinates)
          if (globalFilters.gestorId) {
            const subIds = [parseInt(globalFilters.gestorId), ...getSubordinateIds(dbEmployees, globalFilters.gestorId)];
            const rId = parseInt(d.responsavelId || d.ResponsavelId);
            if (!subIds.includes(rId)) return false;
          } else {
            // Filter by responsible if set
            if (globalFilters.colaboradorId && String(d.responsavelId || d.ResponsavelId) !== globalFilters.colaboradorId) return false;
            // Filter demands by the team/manager of their responsible
            const resp = dbEmployees?.find(e => e.id === (d.responsavelId || d.ResponsavelId));
            if (resp) {
              if (globalFilters.gestor && resp.managerStr !== globalFilters.gestor && resp.manager !== globalFilters.gestor && resp.areaNome !== globalFilters.gestor) return false;
              if (globalFilters.cargo && resp.teamStr !== globalFilters.cargo && resp.team !== globalFilters.cargo && resp.cargoNome !== globalFilters.cargo) return false;
            }
          }
          return true;
        });
      }, [demandas, dbEmployees, globalFilters, getSubordinateIds, localDemandaStatusFilter, demandaResponsibleFilter]);


      const handleAdd = () => {
        const payload = {
          title: '',
          ownerId: dbEmployees?.length > 0 ? (currentUser?.colaboradorId || dbEmployees[0].id) : '',
          status: 'Não Iniciado',
          priority: 'Baixa',
          startDate: null,
          endDate: null,
          demandaId: selectedDemandaId || null
        };

        // Gera ID clientside temporário negativo
        const tempId = -(Date.now());

        // Adiciona apenas à UI. O syncTask cuidará de persistir via POST assim que houver demandaID.
        setTasks(prev => [...prev, { id: tempId, ...payload }]);
        
        // Se já houver uma demanda selecionada no filtro global, tenta sincronizar imediatamente
        if (payload.demandaId) {
          setTimeout(() => {
            setTasks(current => {
               const t = current.find(x => x.id === tempId);
               if (t) syncTask(t);
               return current;
            });
          }, 200);
        }
      };

      const handleStatusChange = (task, newStatus) => {
        if (newStatus === task.status) return;
        setStatusModal({ taskId: task.id, newStatus, oldStatus: task.status });
        setStatusComment('');
      };

      const confirmStatusChange = () => {
        if (!statusModal) return;
        const { taskId, newStatus, oldStatus } = statusModal;
        updateTask(taskId, 'status', newStatus);
        setTimeout(() => {
          setTasks(current => {
            const t = current.find(x => x.id === taskId);
            if (t) {
              const payload = {
                ...t, status: newStatus, comentarioStatus: statusComment,
                registrarHistorico: true, statusAnterior: oldStatus,
                usuarioId: currentUser?.userId
              };
              fetch(`${API_BASE}/api/tasks/${taskId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
              }).catch(() => { });

              // Business rule: Auto-start demand when a task becomes active
              const activeStatuses = ['Em Andamento', 'Pausado', 'Bloqueio'];
              if (activeStatuses.includes(newStatus) && t.demandaId) {
                const linkedDemanda = demandas.find(d => (d.Id || d.id) === t.demandaId);
                if (linkedDemanda && (linkedDemanda.Status || linkedDemanda.status) === 'Não Iniciado') {
                  handleDemandaStatusChange(linkedDemanda, 'Em Andamento', true);
                }
              }
            }
            return current;
          });
        }, 100);
        setStatusModal(null);
      };

      const handleDemandaStatusChange = (demanda, newStatus, forceUpdate = false) => {
        const demandaId = demanda.Id || demanda.id;
        const oldStatus = demanda.Status || demanda.status;
        if (newStatus === oldStatus && !forceUpdate) return;

        // Business rule: Demand can only be marked as 'Concluído' if ALL linked tasks are 'Concluído' or 'Cancelado'
        if (newStatus === 'Concluído') {
          const linkedTasks = tasks.filter(t => t.demandaId === demandaId);
          if (linkedTasks.length > 0) {
            const allDone = linkedTasks.every(t => t.status === 'Concluído' || t.status === 'Cancelado');
            if (!allDone) {
              const pendingCount = linkedTasks.filter(t => t.status !== 'Concluído' && t.status !== 'Cancelado').length;
              alert(`Não é possível concluir esta demanda.\n\n${pendingCount} tarefa(s) ainda não foram finalizadas ou canceladas.\n\nFinalize ou cancele todas as tarefas vinculadas antes de concluir a demanda.`);
              return;
            }
          }
        }

        fetch(`${API_BASE}/api/demandas/${demandaId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': authToken ? 'Bearer ' + authToken : '' },
          body: JSON.stringify({ titulo: demanda.Titulo || demanda.titulo, status: newStatus, prioridade: demanda.Prioridade || demanda.prioridade, registrarHistorico: true, statusAnterior: oldStatus })
        }).then(() => {
          if (setDemandas) setDemandas(prev => prev.map(d => (d.Id || d.id) === demandaId ? { ...d, Status: newStatus, status: newStatus } : d));
        }).catch(() => alert('Erro ao atualizar status da demanda'));
      };

      const saveDemanda = (form) => {
        const method = form.id ? 'PUT' : 'POST';
        const url = form.id ? `${API_BASE}/api/demandas/${form.id}` : `${API_BASE}/api/demandas`;

        fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': authToken ? 'Bearer ' + authToken : '' },
          body: JSON.stringify({
            titulo: form.titulo,
            responsavelId: form.responsavelId ? Number(form.responsavelId) : null,
            status: form.status || 'Não Iniciado',
            prioridade: form.prioridade || 'Média',
            inicioPlanjado: form.inicioPlanjado || null,
            fimPlanejado: form.fimPlanejado || null,
            responsavelAnterior: form.responsavelAnterior,
            inicioAnterior: form.inicioAnterior,
            fimAnterior: form.fimAnterior,
            justificativa: form.justificativa
          })
        })
        .then(async res => {
          const text = await res.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            // Se não for JSON, mostra o começo do HTML retornado para diagnóstico.
            throw new Error(`Resposta do servidor não é JSON (HTTP ${res.status}): ${text.substring(0, 100)}...`);
          }
          
          if (!res.ok) throw new Error(data.error || 'Falha no servidor');
          return data;
        })
        .then(data => {
          if (method === 'POST') {
            const newDemanda = { 
              Id: data.id, id: data.id, 
              Titulo: form.titulo, titulo: form.titulo, 
              ResponsavelId: form.responsavelId ? Number(form.responsavelId) : null, 
              Status: form.status || 'Não Iniciado', status: form.status || 'Não Iniciado', 
              Prioridade: form.prioridade || 'Média', prioridade: form.prioridade || 'Média', 
              InicioPlanjado: form.inicioPlanjado || null, inicioPlanjado: form.inicioPlanjado || null, 
              FimPlanejado: form.fimPlanejado || null, fimPlanejado: form.fimPlanejado || null, 
              TotalTarefas: 0, TarefasConcluidas: 0 
            };
            setDemandas(prev => [newDemanda, ...prev]);
          } else {
            setDemandas(prev => prev.map(d => (d.Id || d.id) === form.id ? { ...d, ...form, Titulo: form.titulo, ResponsavelId: Number(form.responsavelId), Status: form.status, Prioridade: form.prioridade, InicioPlanjado: form.inicioPlanjado, FimPlanejado: form.fimPlanejado } : d));
          }
          setDemandaModal(null);
        })
        .catch(err => {
          console.error('Save Demand Error:', err);
          alert('Erro ao salvar demanda: ' + err.message);
        });
      };

      const handleNewDemanda = () => {
        setDemandaModal({ titulo: '', responsavelId: currentUser?.colaboradorId || null, inicioPlanjado: '', fimPlanejado: '', status: 'Não Iniciado', prioridade: 'Média' });
      };

      const handleEditDemanda = (d) => {
        const dId = d.Id || d.id;
        const pStart = d.inicioPlanjado || d.InicioPlanjado;
        const pEnd = d.fimPlanejado || d.FimPlanejado;
        const rId = d.ResponsavelId || d.responsavelId;

        setDemandaModal({
          id: dId,
          titulo: d.Titulo || d.titulo,
          responsavelId: rId,
          inicioPlanjado: pStart ? pStart.slice(0, 10) : '',
          fimPlanejado: pEnd ? pEnd.slice(0, 10) : '',
          status: d.Status || d.status,
          prioridade: d.Prioridade || d.prioridade,
          // Original values for change detection
          responsavelAnterior: rId,
          inicioAnterior: pStart,
          fimAnterior: pEnd,
          justificativa: ''
        });
      };

      const toggleDemandaFilter = (demandaId) => {
        setSelectedDemandaId(prev => prev === demandaId ? null : demandaId);
      };

      const renderGantt = () => {
        const daysCount = ganttScale === 'week' ? 7 : (ganttScale === 'quarter' ? 90 : 30);
        const colWidth = ganttScale === 'quarter' ? 12 : (ganttScale === 'week' ? 40 : 24);
        const baseDateObj = new Date(ganttBaseDate + 'T12:00:00');
        const days = [];
        for (let i = 0; i < daysCount; i++) {
          const d = new Date(baseDateObj);
          d.setDate(d.getDate() + i);
          days.push(d);
        }

        return (
          <div className="gantt-container" style={{ marginTop: '20px', background: '#fff', borderRadius: '8px', padding: '16px', border: '1px solid var(--line)' }}>
            <div style={{ display: 'flex', gap: '12px', marginBottom: '16px', flexWrap: 'wrap', alignItems: 'center' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--muted)' }}>calendar_today</span>
                <input type="date" className="monday-date-input" value={ganttBaseDate} onChange={e => setGanttBaseDate(e.target.value)} title="Data de início" style={{ border: '1px solid var(--line)', borderRadius: '6px', padding: '4px 8px' }} />
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--muted)' }}>aspect_ratio</span>
                <select className="monday-select" value={ganttScale} onChange={e => setGanttScale(e.target.value)} style={{ border: '1px solid var(--line)', borderRadius: '6px', padding: '4px 8px' }}>
                  <option value="week">Semana (7 dias)</option>
                  <option value="month">Mês (30 dias)</option>
                  <option value="quarter">Trimestre (90 dias)</option>
                </select>
              </div>
              {selectedDemandaId && (
                <div style={{ display: 'flex', alignItems: 'center', gap: '6px', background: 'rgba(51,204,204,.12)', padding: '4px 12px', borderRadius: '20px', fontSize: '.8rem', color: 'var(--primary)', fontWeight: 600 }}>
                  <span className="material-symbols-outlined" style={{ fontSize: '14px' }}>filter_alt</span>
                  Filtrando por demanda
                  <span style={{ cursor: 'pointer', marginLeft: '4px' }} onClick={() => setSelectedDemandaId(null)} title="Limpar filtro">✕</span>
                </div>
              )}
            </div>

            <div style={{ overflowX: 'auto' }}>
              <div style={{ display: 'flex', borderBottom: '1px solid #eee', paddingBottom: '8px', minWidth: 'min-content' }}>
                <div style={{ minWidth: '220px', width: '220px', fontWeight: 'bold', position: 'sticky', left: 0, background: '#fff', zIndex: 1 }}>Tarefas</div>
                {days.map((d, i) => (
                  <div key={i} className={`gantt-day-header ${ganttScale === 'quarter' ? 'rotated' : ''}`} style={{ minWidth: `${colWidth}px`, width: `${colWidth}px`, textAlign: 'center', fontSize: '10px', color: 'var(--muted)', borderLeft: i % 7 === 0 && ganttScale !== 'week' ? '1px solid #f0f0f0' : 'none' }}>
                    {d.getDate()}/{d.getMonth() + 1}
                  </div>
                ))}
              </div>
              {filteredTasks.length === 0 && <div className="empty-state">Sem tarefas correspondentes aos filtros.</div>}
              {filteredTasks.map(t => {
                const employee = dbEmployees?.find(e => e.id === t.ownerId) || dbEmployees?.[0] || {};
                let offsetDays = 0;
                let lengthDays = 0;
                let isVisible = false;

                if (t.startDate && t.endDate) {
                  const startObj = new Date(t.startDate + 'T12:00:00');
                  const endObj = new Date(t.endDate + 'T12:00:00');
                  offsetDays = Math.floor((startObj - baseDateObj) / (1000 * 60 * 60 * 24));
                  lengthDays = Math.floor((endObj - startObj) / (1000 * 60 * 60 * 24)) + 1;

                  const visualLeft = Math.max(0, offsetDays) * colWidth;
                  const endOffset = offsetDays + lengthDays;
                  const visualEnd = Math.min(daysCount, endOffset);
                  const visualStart = Math.max(0, offsetDays);
                  const visualWidth = Math.max(0, (visualEnd - visualStart) * colWidth);

                  if (visualWidth > 0 && offsetDays < daysCount && endOffset > 0) {
                    isVisible = { left: visualLeft, width: visualWidth };
                  }
                }

                return (
                  <div key={t.id} style={{ display: 'flex', alignItems: 'center', marginTop: '8px', borderBottom: '1px solid #f9f9f9', paddingBottom: '4px' }}>
                    <div style={{ minWidth: '220px', width: '220px', fontSize: '12px', display: 'flex', alignItems: 'center', gap: '8px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', position: 'sticky', left: 0, background: '#fff', zIndex: 1 }}>
