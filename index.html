    function ScaleView({ currentMonth: defaultMonth, monthDays: defaultMonthDays, workDays, setWorkDays, requests, setRequests, currentUser, authToken, globalFilters }) {
      const [selectedMonthOffset, setSelectedMonthOffset] = useState(0);

      const getSubIdsScale = useCallback((managerId) => {
        const direct = employees.filter(e => String(e.gestorId) === String(managerId));
        let ids = direct.map(e => e.id);
        direct.forEach(sub => { ids = [...ids, ...getSubIdsScale(sub.id)]; });
        return Array.from(new Set(ids));
      }, [employees]);

      const isMatch = (e) => {
        if (!globalFilters) return true;
        if (globalFilters.colaboradorId && String(e.id) !== globalFilters.colaboradorId) return false;

        // Full hierarchy filter: manager + all recursive subordinates
        if (globalFilters.gestorId) {
          const subIds = [parseInt(globalFilters.gestorId), ...getSubIdsScale(globalFilters.gestorId)];
          if (!subIds.includes(parseInt(e.id))) return false;
        } else if (globalFilters.gestor) {
          if (e.managerStr !== globalFilters.gestor && e.manager !== globalFilters.gestor && e.areaNome !== globalFilters.gestor) return false;
        }

        if (globalFilters.cargo && e.teamStr !== globalFilters.cargo && e.team !== globalFilters.cargo && e.cargoNome !== globalFilters.cargo) return false;
        return true;
      };

      const filteredEmployees = useMemo(() => employees.filter(isMatch), [employees, globalFilters, getSubIdsScale]);

      const [selectedEmployeeId, setSelectedEmployeeId] = useState(currentUser.isAdmin ? (filteredEmployees.length > 0 ? filteredEmployees[0].id : '') : currentUser.colaboradorId);
      const isReadOnly = !currentUser.isAdmin && selectedEmployeeId !== currentUser.colaboradorId;
      const [compareEntity, setCompareEntity] = useState('none');
      const [adjustModal, setAdjustModal] = useState(null); // { dateKey, currentStatus }
      const [adjustMotivo, setAdjustMotivo] = useState('');
      const [adjustNewValue, setAdjustNewValue] = useState('Presencial');

      useEffect(() => {
        if (!currentUser.isAdmin && currentUser.colaboradorId) {
          setSelectedEmployeeId(currentUser.colaboradorId);
          return;
        }

        if (filteredEmployees.length > 0) {
          if (!filteredEmployees.find(e => e.id === selectedEmployeeId)) {
            setSelectedEmployeeId(filteredEmployees[0].id);
          }
        } else {
          setSelectedEmployeeId('');
        }
      }, [filteredEmployees, selectedEmployeeId, currentUser]);

      const displayMonth = useMemo(() => {
        const d = new Date(defaultMonth);
        d.setMonth(d.getMonth() + selectedMonthOffset);
        return d;
      }, [defaultMonth, selectedMonthOffset]);

      const displayMonthDays = useMemo(() => getMonthMatrix(displayMonth), [displayMonth]);
      const holidays = useMemo(() => getBrazilianHolidays(displayMonth.getFullYear()), [displayMonth]);

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const isPastDate = (dateKey) => {
        const d = new Date(dateKey + 'T12:00:00');
        d.setHours(0, 0, 0, 0);
        return d < today;
      };

      const toggleDay = (dateKey) => {
        if (isReadOnly) return;
        // --- BLOQUEIO DE DIAS PASSADOS ---
        if (isPastDate(dateKey)) {
          setAdjustModal({ dateKey, currentStatus: (workDays[selectedEmployeeId] || {})[dateKey] || 'Não definido' });
          setAdjustMotivo('');
          setAdjustNewValue('Presencial');
          return;
        }

        const currentData = workDays[selectedEmployeeId] || {};
        const current = currentData[dateKey];

        let next = 'Presencial';
        if (current === 'Presencial') next = 'Home Office';
        else if (current === 'Home Office') next = null;

        setWorkDays(prev => {
          const empData = { ...(prev[selectedEmployeeId] || {}) };
          if (next) {
            empData[dateKey] = next;
          } else {
            delete empData[dateKey];
          }
          return { ...prev, [selectedEmployeeId]: empData };
        });

        const existingReq = requests && requests.find(r => r.employeeId === selectedEmployeeId && r.type === 'Escala de Trabalho' && r.startDate === dateKey);

        if (next === null) {
          if (existingReq) {
            fetch(`${API_BASE}/api/requests/${existingReq.id}`, { method: 'DELETE', headers: apiHeaders(authToken) })
              .then(res => {
                if (!res.ok) throw new Error('Erro');
                if (setRequests) setRequests(prev => prev.filter(r => r.id !== existingReq.id));
              })
              .catch(e => console.error(e));
          }
        } else {
          if (existingReq) {
            fetch(`${API_BASE}/api/requests/${existingReq.id}`, {
              method: 'PUT',
              headers: apiHeaders(authToken),
              body: JSON.stringify({ localTrabalho: next })
            })
              .then(res => {
                if (!res.ok) throw new Error('Erro');
                if (setRequests) setRequests(prev => prev.map(r => r.id === existingReq.id ? { ...r, localTrabalho: next, dataModificacao: new Date().toISOString() } : r));
              })
              .catch(e => console.error(e));
          } else {
            fetch(`${API_BASE}/api/requests`, {
              method: 'POST',
              headers: apiHeaders(authToken),
              body: JSON.stringify({
                employeeId: selectedEmployeeId,
                type: 'Escala de Trabalho',
                startDate: dateKey,
                endDate: dateKey,
                localTrabalho: next,
                priority: 'Baixa',
                status: 'Aprovado'
              })
            })
              .then(async res => {
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erro interno');
                return data;
              })
              .then(data => { if (setRequests) setRequests(prev => [...prev, data]); })
              .catch(e => {
                console.error(e);
                alert('Aviso: Falha ao sincronizar dia. Recarregue a página.');
              });
          }
        }
      };

      const submitRetroactiveAdjust = () => {
        if (isReadOnly) return;
        if (!adjustModal) return;
        if (!adjustMotivo.trim()) { alert('Informe o motivo do ajuste retroativo.'); return; }
        // Cria uma solicitação do tipo 'Ajuste de Escala' pendente de aprovação
        const payload = {
          employeeId: selectedEmployeeId,
          type: 'Ajuste de Escala',
          startDate: adjustModal.dateKey,
          endDate: adjustModal.dateKey,
          note: `${adjustNewValue} | Motivo: ${adjustMotivo}`,
          priority: 'Média',
          status: 'Pendente',
          localTrabalho: adjustNewValue
        };
        fetch(`${API_BASE}/api/requests`, {
          method: 'POST',
          headers: apiHeaders(authToken),
          body: JSON.stringify(payload)
        })
          .then(r => r.json())
          .then(data => {
            if (setRequests) setRequests(prev => [...prev, { id: data.id, ...payload }]);
            alert('Solicitação de ajuste retroativo enviada para aprovação do gestor.');
            setAdjustModal(null);
          })
          .catch(() => alert('Erro ao enviar solicitação.'));
      };

      const currentEmployeeData = workDays[selectedEmployeeId] || {};

      const businessDaysCount = useMemo(() => {
        let count = 0;
        for (const day of displayMonthDays) {
          if (!day) continue;
          if (day.getDay() === 0 || day.getDay() === 6) continue;

          const dateKey = day.toISOString().slice(0, 10);
          if (holidays[dateKey]) continue;

          const hasAbsence = requests && requests.some(r => {
            if (r.employeeId !== selectedEmployeeId) return false;
            if (r.status === 'Rejeitado') return false;
            if (!['Férias integrais', 'Férias fracionadas', 'Day-off', 'Saúde (Exames/Consultas)'].includes(r.type)) return false;
            return isWithinRange(dateKey, r.startDate, r.endDate);
          });

          if (!hasAbsence) {
            count++;
          }
        }
        return count;
      }, [displayMonthDays, holidays, requests, selectedEmployeeId]);

      const presencialCount = useMemo(() => {
        return Object.keys(currentEmployeeData).filter(k => {
          if (!isWithinRange(k,
            new Date(displayMonth.getFullYear(), displayMonth.getMonth(), 1).toISOString().slice(0, 10),
            new Date(displayMonth.getFullYear(), displayMonth.getMonth() + 1, 0).toISOString().slice(0, 10)
          )) return false;
          return currentEmployeeData[k] === 'Presencial';
        }).length;
      }, [currentEmployeeData, displayMonth]);

      // --- % preenchimento mensal por colaborador ---
      const fillStats = useMemo(() => {
        const monthStart = new Date(displayMonth.getFullYear(), displayMonth.getMonth(), 1).toISOString().slice(0, 10);
        const monthEnd = new Date(displayMonth.getFullYear(), displayMonth.getMonth() + 1, 0).toISOString().slice(0, 10);
        let totalBiz = 0;
        for (const day of displayMonthDays) {
          if (!day) continue;
          if (day.getDay() === 0 || day.getDay() === 6) continue;
          const dk = day.toISOString().slice(0, 10);
          if (holidays[dk]) continue;
          totalBiz++;
        }
        const results = employees.map(emp => {
          const empData = workDays[emp.id] || {};
          let filled = 0;
          for (const day of displayMonthDays) {
            if (!day) continue;
            if (day.getDay() === 0 || day.getDay() === 6) continue;
            const dk = day.toISOString().slice(0, 10);
            if (holidays[dk]) continue;
            // Check for absence — if absent, it's "filled" implicitly
            const hasAbsence = requests && requests.some(r => {
              if (r.employeeId !== emp.id) return false;
              if (r.status === 'Rejeitado') return false;
              if (!['Férias integrais', 'Férias fracionadas', 'Day-off', 'Saúde (Exames/Consultas)'].includes(r.type)) return false;
              return isWithinRange(dk, r.startDate, r.endDate);
            });
            if (hasAbsence || empData[dk]) filled++;
          }
          return { id: emp.id, name: emp.name.split(' ')[0], pct: totalBiz > 0 ? Math.round((filled / totalBiz) * 100) : 0, filled, total: totalBiz };
        });
        return results.filter(r => filteredEmployees.some(fe => fe.id === r.id));
      }, [filteredEmployees, workDays, displayMonthDays, holidays, requests]);

      const getComparedPeople = (dateKey) => {
        if (compareEntity === 'none') return [];
        if (compareEntity.startsWith('emp_')) {
          const empId = Number(compareEntity.replace('emp_', ''));
          if (empId === selectedEmployeeId) return [];
          const otherData = workDays[empId] || {};
          if (otherData[dateKey] === 'Presencial') {
            const emp = employees.find(e => e.id === empId);
            return emp ? [emp] : [];
          }
          return [];
        }
        if (compareEntity.startsWith('team_')) {
          const teamName = compareEntity.replace('team_', '');
          const teamMembers = (filteredEmployees || []).filter(e => e && e.areaNome === teamName && e.id !== selectedEmployeeId);
          return teamMembers.filter(member => {
            if (!member || !member.id) return false;
            const memberData = workDays[member.id] || {};
            return memberData[dateKey] === 'Presencial';
          });
        }
        return [];
      };

      const percentage = businessDaysCount > 0 ? Math.round((presencialCount / businessDaysCount) * 100) : 0;
      const targetReached = percentage >= 50;
      const uniqueAreas = Array.from(new Set((employees || []).map(e => e?.areaNome).filter(Boolean)));

      return (
        <div className="dashboard-grid">
          {/* Modal de ajuste retroativo */}
          {adjustModal && (
            <div className="status-modal-overlay">
              <div className="status-modal">
                <h3 style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <span className="material-symbols-outlined" style={{ color: '#f59e0b', fontSize: '22px' }}>lock_clock</span>
                  Ajuste Retroativo — {adjustModal.dateKey}
                </h3>
                <p style={{ color: 'var(--muted)', marginBottom: '12px' }}>
                  Esta data já passou. A alteração precisa de aprovação do <strong>gestor hierárquico</strong> ou <strong>administrador</strong>.
                  <br />Status atual: <strong>{adjustModal.currentStatus}</strong>
                </p>
                <div className="field" style={{ marginBottom: '12px' }}>
                  <label>Novo valor desejado:</label>
                  <select value={adjustNewValue} onChange={e => setAdjustNewValue(e.target.value)} style={{ width: '100%', padding: '8px', borderRadius: '6px', border: '1px solid var(--line)' }}>
                    <option value="Presencial">Presencial</option>
                    <option value="Home Office">Home Office</option>
                  </select>
                </div>
                <div className="field" style={{ marginBottom: '12px' }}>
                  <label>Motivo do ajuste:</label>
                  <textarea value={adjustMotivo} onChange={e => setAdjustMotivo(e.target.value)} placeholder="Ex.: Esqueci de registrar, estava presencial no escritório..." style={{ width: '100%', minHeight: '70px', boxSizing: 'border-box', padding: '10px', border: '1px solid var(--line)', borderRadius: '8px', fontSize: '.875rem', resize: 'vertical' }} />
                </div>
                <div className="action-row" style={{ display: 'flex', gap: '10px', justifyContent: 'flex-end' }}>
                  <button className="btn btn-secondary" onClick={() => setAdjustModal(null)}>
                    {isReadOnly ? 'Fechar' : 'Cancelar'}
                  </button>
                  {!isReadOnly && <button className="btn btn-primary" onClick={submitRetroactiveAdjust}>Enviar para Aprovação</button>}
                </div>
              </div>
            </div>
          )}

          <header className="topbar">
            <div>
              <h2>Escala de Trabalho</h2>
              <p>Defina seus dias de trabalho presencial e home office. O objetivo é alcançar pelo menos 50% de frequência presencial.</p>
            </div>
          </header>

          {isReadOnly && (
            <div className="alert-banner" style={{ background: 'rgba(245,158,11,0.1)', color: '#d97706', padding: '12px', borderRadius: '8px', marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '10px', fontSize: '0.9rem', border: '1px solid #f59e0b44' }}>
              <span className="material-symbols-outlined" style={{ fontSize: '20px' }}>visibility</span>
              <div>
                <strong>Modo Somente Leitura:</strong> Você está visualizando a escala de outro colaborador.
                Alterações são permitidas apenas para sua própria escala.
              </div>
            </div>
          )}

          <section className="form-grid">
            <div className="card" style={{ gridColumn: '1 / -1', marginBottom: '-4px' }}>
              <div className="field-grid" style={{ alignItems: 'flex-end' }}>
                <div className="field">
                  <label>Visualizar escala do colaborador:</label>
                  <select
                    value={selectedEmployeeId}
                    onChange={(e) => setSelectedEmployeeId(Number(e.target.value))}
                    disabled={!currentUser.isAdmin}
                  >
                    {filteredEmployees.length === 0 && <option value="">Nenhum colaborador encontrado</option>}
                    {filteredEmployees.map((employee) => (
                      <option key={employee.id} value={employee.id}>
                        {employee.name} · {employee.team}
                      </option>
                    ))}
                  </select>
                </div>

                <div className="field">
                  <label>Comparar com:</label>
                  <select value={compareEntity} onChange={(e) => setCompareEntity(e.target.value)}>
                    <option value="none">Nenhum</option>
                    <optgroup label="Áreas / Equipes">
                      {uniqueAreas.map(area => (
                        <option key={`team_${area}`} value={`team_${area}`}>Área: {area}</option>
                      ))}
                    </optgroup>
                    <optgroup label="Colaboradores Individuais">
                      {filteredEmployees.map(employee => (
                        <option key={`emp_${employee.id}`} value={`emp_${employee.id}`}>
                          {employee.name}
                        </option>
                      ))}
                    </optgroup>
                  </select>
                </div>

              </div>
            </div>

            <div className="card">
              <div className="section-title">
                <div>
                  <h3>Controle do Mês - {displayMonth.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}</h3>
                  <p>Clique nos dias úteis para definir o status. <span style={{ color: '#f59e0b', fontWeight: 600 }}>Dias passados exigem aprovação.</span></p>
                </div>
                <div style={{ display: 'flex', gap: '8px', alignItems: 'center', justifyContent: 'flex-end' }}>
                  <button className="btn btn-secondary" style={{ padding: '6px 10px', fontSize: '0.85rem' }} onClick={() => setSelectedMonthOffset(o => o - 1)}>&lt; Mês Anterior</button>
                  <button className="btn btn-secondary" style={{ padding: '6px 10px', fontSize: '0.85rem' }} onClick={() => setSelectedMonthOffset(o => o + 1)}>Próximo Mês &gt;</button>
                </div>
              </div>

              <div className="legend">
                <span><i className="ok"></i> Presencial</span>
                <span><i className="sel"></i> Home Office</span>
                <span><i className="absence"></i> Ausência</span>
                <span><i style={{ background: 'rgba(245,158,11,.25)', border: '1px solid #f59e0b' }}></i> Dia passado (bloqueado)</span>
                {compareEntity !== 'none' && <span><i className="compare"></i> Presença Comparada</span>}
              </div>

              <div style={{ height: '14px' }}></div>
              <div className="calendar-grid">
                {weekdayLabels.map((label) => <div key={label} className="calendar-label">{label}</div>)}
                {displayMonthDays.map((day, index) => {
                  if (!day) return <div key={`empty-${index}`} className="calendar-day empty"></div>;
                  const dateKey = day.toISOString().slice(0, 10);
                  const isWeekend = day.getDay() === 0 || day.getDay() === 6;
                  const status = currentEmployeeData[dateKey];
                  const holidayInfo = holidays[dateKey];
                  const isPast = isPastDate(dateKey);

                  const absenceRequest = requests && requests.find(r => {
                    if (r.employeeId !== selectedEmployeeId) return false;
                    if (r.status === 'Rejeitado') return false;
                    if (!['Férias integrais', 'Férias fracionadas', 'Day-off', 'Saúde (Exames/Consultas)'].includes(r.type)) return false;
                    return isWithinRange(dateKey, r.startDate, r.endDate);
                  });

                  const isNonWorkingDay = isWeekend || holidayInfo || absenceRequest;
                  const comparedPeople = getComparedPeople(dateKey);
                  const isComparedPresent = comparedPeople.length > 0;
                  const tooltipText = isComparedPresent ? `Presencial: ${comparedPeople.map(p => p.name).join(', ')}` : '';

                  let absenceLabel = '';
                  if (absenceRequest) {
                    if (absenceRequest.type.includes('Férias')) absenceLabel = 'Férias';
                    else if (absenceRequest.type === 'Day-off') absenceLabel = 'Folga';
                    else absenceLabel = 'Saúde';
                  }

                  return (
                    <div
                      key={dateKey}
                      onClick={() => !isNonWorkingDay && toggleDay(dateKey)}
                      className={`calendar-day ${isWeekend ? 'weekend' : ''} ${!isNonWorkingDay ? 'clickable' : ''} ${holidayInfo ? 'holiday' : ''} ${absenceRequest ? 'absence' : ''} ${status === 'Presencial' ? 'presencial' : status === 'Home Office' ? 'home-office' : ''} ${isPast && !isNonWorkingDay ? 'past-day' : ''}`}
                      title={absenceRequest ? `Período de ${absenceRequest.type} (${absenceRequest.status})` : holidayInfo ? holidayInfo : isPast ? 'Dia passado — registro bloqueado' : ''}
                      style={isPast && !isNonWorkingDay ? { opacity: .8, borderStyle: 'solid', background: status === 'Presencial' ? 'rgba(51,204,204,0.15)' : status === 'Home Office' ? 'rgba(59,130,246,0.1)' : '' } : undefined}
                    >
                      {day.getDate()}
                      {isPast && !isNonWorkingDay && !status && !absenceRequest && <div className="day-label" style={{ fontSize: '.55rem', color: '#f59e0b', opacity: 0.6 }}>🔒</div>}
                      {status && !absenceRequest && (
                        <div className="day-label" style={{ fontWeight: isPast ? 800 : 500, color: isPast ? 'var(--title)' : '' }}>
                          {status === 'Presencial' ? 'Pres' : 'Home'}
                        </div>
                      )}
                      {absenceRequest && <div className="day-label" title={absenceRequest.status}>{absenceLabel}</div>}

                      {isComparedPresent && !isNonWorkingDay && (
                        <div className="avatar-overlap-group" title={tooltipText}>
                          {comparedPeople.slice(0, 3).map((p, idx) => (
                            <img
                              key={p.id}
                              src={p.avatarUrl || `https://ui-avatars.com/api/?name=${p.name}&background=random`}
                              className="avatar-clump-item"
                              style={{ zIndex: 10 - idx }}
                              alt={p.name}
                            />
                          ))}
                          {comparedPeople.length > 3 && (
                            <div className="avatar-clump-more">+{comparedPeople.length - 3}</div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {Object.keys(holidays).filter(date => new Date(date + 'T12:00:00').getMonth() === displayMonth.getMonth()).length > 0 && (
                <div className="holiday-legend-list">
                  <strong>Feriados no período:</strong>
                  {Object.entries(holidays)
                    .filter(([date]) => new Date(date + 'T12:00:00').getMonth() === displayMonth.getMonth())
                    .map(([date, name]) => (
                      <span key={date} style={{ marginRight: '12px' }}>
                        {new Date(date + 'T12:00:00').getDate().toString().padStart(2, '0')}/{(new Date(date + 'T12:00:00').getMonth() + 1).toString().padStart(2, '0')} - {name}
                      </span>
                    ))}
                </div>
              )}
            </div>

            <div className="form-panel">
              <div className="card">
                <div className="section-title">
                  <div>
                    <h3>Acompanhamento da Meta</h3>
                    <p>Progresso do mês atual em relação aos dias úteis.</p>
                  </div>
                </div>

                <div className="stat-card" style={{ marginTop: '20px' }}>
                  <p>Dias úteis no mês: {businessDaysCount}</p>
                  <div className="stat-value">{presencialCount} <span style={{ fontSize: '1rem', color: 'var(--muted)', fontWeight: 'normal' }}>dias presenciais</span></div>
                  <div className="stat-trend" style={{ color: targetReached ? '#8cf3b0' : '#ffe2a9' }}>
                    {percentage}% concluído (Meta: 50%)
                  </div>

                  <div className="progress-container">
                    <div className="progress-target-line"></div>
                    <div className={`progress-fill ${targetReached ? 'success' : 'warning'}`} style={{ width: `${Math.min(percentage, 100)}%` }}></div>
                  </div>
                </div>

                {/* % de preenchimento mensal por colaborador */}
                <div style={{ marginTop: '24px' }}>
                  <h4 style={{ fontSize: '.9rem', fontWeight: 700, color: 'var(--title)', marginBottom: '12px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                    <span className="material-symbols-outlined" style={{ fontSize: '16px', color: 'var(--primary)' }}>assignment_turned_in</span>
                    Preenchimento Mensal da Equipe
                  </h4>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                    {fillStats.map(fs => (
                      <div key={fs.id} style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '.82rem' }}>
                        <span style={{ minWidth: '60px', fontWeight: fs.id === selectedEmployeeId ? 700 : 400, color: fs.id === selectedEmployeeId ? 'var(--primary)' : 'var(--text)' }}>{fs.name}</span>
                        <div style={{ flex: 1, height: '8px', background: 'var(--line)', borderRadius: '4px', overflow: 'hidden' }}>
                          <div style={{ width: fs.pct + '%', height: '100%', background: fs.pct === 100 ? '#10b981' : fs.pct >= 50 ? '#3b82f6' : '#f59e0b', borderRadius: '4px', transition: 'width .3s' }}></div>
                        </div>
                        <span style={{ minWidth: '36px', textAlign: 'right', fontWeight: 700, color: fs.pct === 100 ? '#10b981' : 'var(--title)' }}>{fs.pct}%</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="mini-list" style={{ marginTop: '20px' }}>
                  <div className="mini-item">
                    <h4 style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                      <span className="material-symbols-outlined icon-purple" style={{ fontSize: '16px' }}>balance</span>
                      Por que 50%?
                    </h4>
                    <p>O modelo híbrido busca equilibrar a flexibilidade do trabalho remoto com a colaboração e integração do ambiente presencial.</p>
                  </div>
                  <div className="mini-item">
                    <h4 style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                      <span className="material-symbols-outlined icon-orange" style={{ fontSize: '16px' }}>lock_clock</span>
                      Dias passados
                    </h4>
                    <p>Alterações em dias que já passaram precisam de aprovação do gestor hierárquico ou administrador do sistema para manter a integridade dos registros.</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      );
    }

    function LoginModal({ onLogin }) {
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        console.log('🔑 Tentando login com email:', email);
        setLoading(true);
        setError('');
        try {
          const res = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email.trim(), senha })
          });
          const data = await res.json();
          console.log('📡 Resposta do login - status:', res.status, 'sucesso:', res.ok);
          if (!res.ok) { 
            console.error('❌ Login falhou:', data.error);
            setError(data.error || 'Credenciais inválidas'); 
            setLoading(false); 
            return; 
          }
          console.log('✅ Login bem-sucedido, chamando onLogin');
          onLogin(data.user, data.token);
        } catch (err) {
          console.error('❌ Erro na requisição:', err.message);
          setError('Servidor indisponível. Verifique se o backend está rodando.');
        }
        setLoading(false);
      };

      return (
        <div className="login-overlay">
          <div className="login-card">
            <div className="login-logo">
              <div className="login-logo-icon">📊</div>
              <div>
                <h1>Superintendência de Controladoria, Tesouraria e BI</h1>
                <p>Gestão à Vista — Acesso Restrito</p>
              </div>
            </div>
            <form onSubmit={handleSubmit}>
              <div className="login-field">
                <label>E-mail corporativo</label>
                <input
                  type="email"
                  value={email}
                  onChange={e => setEmail(e.target.value)}
                  placeholder="seu.email@elopar.com.br"
                  autoFocus
                  required
                />
              </div>
              <div className="login-field">
                <label>Senha</label>
                <input
                  type="password"
                  value={senha}
                  onChange={e => setSenha(e.target.value)}
                  placeholder="Digite sua senha"
                  required
                />
              </div>
              <button type="submit" className="login-btn" disabled={loading}>
                {loading ? 'Entrando...' : 'Entrar'}
              </button>
              <div className="login-error">{error}</div>
            </form>
            <div style={{ textAlign: 'center', marginTop: '20px', color: 'rgba(255,255,255,.3)', fontSize: '.75rem' }}>
              ℹ️ Para acesso, use seu e-mail corporativo cadastrado no sistema.
            </div>
          </div>
        </div>
      );
    }

    function SettingsModal({ currentUser, authToken, onClose, onProfileUpdate, refreshEmployees }) {
      const { Fragment } = React;
      const [tab, setTab] = useState('senha');
      const [msg, setMsg] = useState('');

      // Senha
      const [senhaAtual, setSenhaAtual] = useState('');
      const [novaSenha, setNovaSenha] = useState('');
      const [confSenha, setConfSenha] = useState('');

      // Perfil
      const [avatarFile, setAvatarFile] = useState(null);
      const [previewUrl, setPreviewUrl] = useState(currentUser.avatarUrl || '');

      // CRUD state
      const [colaboradores, setColaboradores] = useState([]);
      const [areas, setAreas] = useState([]);
      const [cargos, setCargos] = useState([]);
      const [hierarquia, setHierarquia] = useState([]);
      const [statusTipos, setStatusTipos] = useState([]);
      const [eventos, setEventos] = useState([]);

      // Form state
      const [formColab, setFormColab] = useState({ id: null, nome: '', email: '', nivelHierarquia: '', areaId: '', cargoId: '', gestorId: '' });
      const [formArea, setFormArea] = useState({ id: null, nome: '', cor: '#33CCCC' });
      const [formCargo, setFormCargo] = useState({ id: null, nome: '' });
      const [formNivel, setFormNivel] = useState({ id: null, descricao: '' });
      const [formStatus, setFormStatus] = useState({ id: null, nome: '', cor: '#c4c4c4', aplicacao: 'Ambos', ordem: 99 });
      const [formEvento, setFormEvento] = useState({ id: null, titulo: '', descricao: '', dataInicio: '', dataFim: '', tipo: 'Reunião' });

      const TABS = [
        { id: 'perfil', label: 'Meu Perfil', icon: 'person', admin: false },
        { id: 'senha', label: 'Senha', icon: 'lock', admin: false },
        { id: 'colaboradores', label: 'Colaboradores', icon: 'group', admin: true },
        { id: 'areas', label: 'Áreas', icon: 'category', admin: true },
        { id: 'cargos', label: 'Cargos', icon: 'badge', admin: true },
        { id: 'hierarquia', label: 'Hierarquia', icon: 'account_tree', admin: true },
        { id: 'status', label: 'Status', icon: 'label', admin: true },
        { id: 'eventos', label: 'Eventos', icon: 'event', admin: true },
      ];

      const headers = useCallback(() => apiHeaders(authToken), [authToken]);

      // Fetch helpers
      const fetchAll = useCallback(async () => {
        if (!currentUser.isAdmin) return;
        try {
          const [rAreas, rColabs, rHier, rCargos, rStatus, rEventos] = await Promise.all([
            fetch(API_BASE + '/api/areas', { headers: headers() }).then(r => r.json()),
            fetch(API_BASE + '/api/employees', { headers: headers() }).then(r => r.json()),
            fetch(API_BASE + '/api/hierarquia', { headers: headers() }).then(r => r.json()),
            fetch(API_BASE + '/api/cargos', { headers: headers() }).then(r => r.json()),
            fetch(API_BASE + '/api/status-tipos', { headers: headers() }).then(r => r.json()),
            fetch(API_BASE + '/api/eventos', { headers: headers() }).then(r => r.json()),
          ]);
          setAreas(Array.isArray(rAreas) ? rAreas : []);
          setColaboradores(Array.isArray(rColabs) ? rColabs : []);
          setHierarquia(Array.isArray(rHier) ? rHier : []);
          setCargos(Array.isArray(rCargos) ? rCargos : []);
          setStatusTipos(Array.isArray(rStatus) ? rStatus : []);
          setEventos(Array.isArray(rEventos) ? rEventos : []);
        } catch (e) { console.error('SettingsModal fetch error:', e); }
      }, [currentUser.isAdmin, headers]);

      useEffect(() => { fetchAll(); }, [fetchAll]);

      // File handling
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) { setAvatarFile(file); setPreviewUrl(URL.createObjectURL(file)); }
      };

      // API calls
      const apiCall = async (url, method, body) => {
        const res = await fetch(url, { method, headers: headers(), body: body ? JSON.stringify(body) : undefined });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro na operação');
        return data;
      };

      const salvarPerfil = async () => {
        setMsg('');
        try {
          const formData = new FormData();
          if (avatarFile) formData.append('avatarFile', avatarFile);
          else formData.append('avatarUrl', previewUrl);
          const res = await fetch(API_BASE + '/api/auth/profile', { method: 'PUT', headers: { Authorization: 'Bearer ' + authToken }, body: formData });
          if (res.ok) { const d = await res.json(); setMsg('Foto atualizada!'); if (onProfileUpdate) onProfileUpdate(d.avatarUrl); }
          else { const e = await res.json(); setMsg(e.error || 'Erro.'); }
        } catch { setMsg('Erro de conexão.'); }
      };

      const trocarSenha = async () => {
        if (novaSenha !== confSenha) { setMsg('Senhas não coincidem.'); return; }
        if (novaSenha.length < 6) { setMsg('Mínimo 6 caracteres.'); return; }
        const res = await fetch(API_BASE + '/api/auth/change-password', { method: 'POST', headers: headers(), body: JSON.stringify({ senhaAtual, novaSenha }) });
        const d = await res.json();
        if (res.ok) { setMsg('Senha alterada!'); setNovaSenha(''); setConfSenha(''); setSenhaAtual(''); }
        else setMsg(d.error || 'Erro.');
      };

      // Generic CRUD handlers
      const saveColab = async () => {
        if (!formColab.nome || !formColab.email || !formColab.nivelHierarquia) { alert('Nome, email e nível obrigatórios'); return; }
        try {
          const url = formColab.id ? `${API_BASE}/api/colaboradores/${formColab.id}` : `${API_BASE}/api/colaboradores`;
          await apiCall(url, formColab.id ? 'PUT' : 'POST', formColab);
          fetchAll(); if (refreshEmployees) refreshEmployees();
          setFormColab({ id: null, nome: '', email: '', nivelHierarquia: '', areaId: '', cargoId: '', gestorId: '' });
          setMsg('Colaborador salvo!');
        } catch (e) { alert(e.message); }
      };

      const toggleColabAtivo = async (c) => {
        if (!confirm(`${c.ativo !== false ? 'Inativar' : 'Reativar'} ${c.name}?`)) return;
        try { await apiCall(`${API_BASE}/api/colaboradores/${c.id}`, 'PUT', { ativo: !(c.ativo !== false) }); fetchAll(); if (refreshEmployees) refreshEmployees(); }
        catch (e) { alert(e.message); }
      };

      const saveArea = async () => {
        if (!formArea.nome) { alert('Nome obrigatório'); return; }
        try {
          const url = formArea.id ? `${API_BASE}/api/areas/${formArea.id}` : `${API_BASE}/api/areas`;
          await apiCall(url, formArea.id ? 'PUT' : 'POST', { nome: formArea.nome, ativo: true });
          fetchAll(); setFormArea({ id: null, nome: '' }); setMsg('Área salva!');
        } catch (e) { alert(e.message); }
      };

      const toggleAreaAtivo = async (a) => {
        if (!confirm(`${a.ativo ? 'Inativar' : 'Reativar'} ${a.nome}?`)) return;
        try { await apiCall(`${API_BASE}/api/areas/${a.id}`, 'PUT', { ativo: !a.ativo }); fetchAll(); }
        catch (e) { alert(e.message); }
      };

      const saveCargo = async () => {
        if (!formCargo.nome) { alert('Nome obrigatório'); return; }
        try {
          const url = formCargo.id ? `${API_BASE}/api/cargos/${formCargo.id}` : `${API_BASE}/api/cargos`;
          await apiCall(url, formCargo.id ? 'PUT' : 'POST', { nome: formCargo.nome });
          fetchAll(); setFormCargo({ id: null, nome: '' }); setMsg('Cargo salvo!');
        } catch (e) { alert(e.message); }
      };

      const deleteCargo = async (c) => {
        if (!confirm(`Excluir cargo "${c.Nome || c.nome}"? Colaboradores vinculados serão desvinculados.`)) return;
        try { await apiCall(`${API_BASE}/api/cargos/${c.Id || c.id}`, 'DELETE'); fetchAll(); }
        catch (e) { alert(e.message); }
      };

      const saveNivel = async () => {
        if (!formNivel.descricao) { alert('Descrição obrigatória'); return; }
        try {
          const url = formNivel.id ? `${API_BASE}/api/hierarquia/${formNivel.id}` : `${API_BASE}/api/hierarquia`;
          const body = formNivel.id ? { descricao: formNivel.descricao } : { descricao: formNivel.descricao };
          await apiCall(url, formNivel.id ? 'PUT' : 'POST', body);
          fetchAll(); setFormNivel({ id: null, descricao: '' }); setMsg('Nível salvo!');
        } catch (e) { alert(e.message); }
      };

      const deleteNivel = async (n) => {
        if (!confirm(`Excluir nível "${n.Descricao || n.descricao}"?`)) return;
        try { await apiCall(`${API_BASE}/api/hierarquia/${n.Id || n.id}`, 'DELETE'); fetchAll(); }
        catch (e) { alert(e.message); }
      };

      const saveStatus = async () => {
        if (!formStatus.nome) { alert('Nome obrigatório'); return; }
        try {
          const url = formStatus.id ? `${API_BASE}/api/status-tipos/${formStatus.id}` : `${API_BASE}/api/status-tipos`;
          await apiCall(url, formStatus.id ? 'PUT' : 'POST', formStatus);
          fetchAll(); setFormStatus({ id: null, nome: '', cor: '#c4c4c4', aplicacao: 'Ambos', ordem: 99 }); setMsg('Status salvo!');
        } catch (e) { alert(e.message); }
      };

      const toggleStatusAtivo = async (s) => {
        try { await apiCall(`${API_BASE}/api/status-tipos/${s.Id || s.id}`, 'PUT', { ativo: !(s.Ativo !== false) }); fetchAll(); }
        catch (e) { alert(e.message); }
      };

      const deleteStatus = async (s) => {
        if (!confirm(`Excluir status "${s.Nome || s.nome}"?`)) return;
        try { await apiCall(`${API_BASE}/api/status-tipos/${s.Id || s.id}`, 'DELETE'); fetchAll(); }
        catch (e) { alert(e.message); }
      };

      const saveEvento = async () => {
        if (!formEvento.titulo || !formEvento.dataInicio) { alert('Título e data de início obrigatórios'); return; }
        try {
          const url = formEvento.id ? `${API_BASE}/api/eventos/${formEvento.id}` : `${API_BASE}/api/eventos`;
          await apiCall(url, formEvento.id ? 'PUT' : 'POST', formEvento);
          fetchAll(); setFormEvento({ id: null, titulo: '', descricao: '', dataInicio: '', dataFim: '', tipo: 'Reunião' }); setMsg('Evento salvo!');
        } catch (e) { alert(e.message); }
      };

      const deleteEvento = async (ev) => {
        if (!confirm(`Excluir evento "${ev.Titulo || ev.titulo}"?`)) return;
        try { await apiCall(`${API_BASE}/api/eventos/${ev.Id || ev.id}`, 'DELETE'); fetchAll(); }
        catch (e) { alert(e.message); }
      };

      // Reusable table row style
      const rowStyle = { borderBottom: '1px solid var(--line)', padding: '8px 0' };
      const labelStyle = { fontSize: '.8rem', fontWeight: 600, color: 'var(--muted)', display: 'block', marginBottom: '4px' };
      const inputStyle = { width: '100%', border: '1px solid var(--line)', borderRadius: '6px', padding: '7px 10px', fontSize: '.875rem', background: 'var(--bg)', color: 'var(--text)', boxSizing: 'border-box' };

      const TIPO_EVENTO_OPTIONS = ['Reunião', 'Workshop', 'Apresentação', 'Treinamento', 'Evento Corporativo', 'Outro'];
      const APLICACAO_OPTIONS = ['Demanda', 'Tarefa', 'Ambos'];

      return (
        <div className="settings-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="settings-modal" style={{ maxWidth: '1000px', width: '97%', maxHeight: '92vh', display: 'flex', flexDirection: 'column', borderRadius: '16px' }}>

            {/* Header */}
            <div style={{ padding: '20px 24px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--line)', paddingBottom: '12px' }}>
              <div>
                <h2 style={{ margin: 0, fontSize: '1.1rem' }}>{currentUser.isAdmin ? 'Painel Administrativo' : 'Configurações'}</h2>
                <p style={{ margin: '2px 0 0', color: 'var(--muted)', fontSize: '.82rem' }}>{currentUser.email}</p>
              </div>
              <button onClick={onClose} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--muted)', display: 'flex', alignItems: 'center' }}>
                <span className="material-symbols-outlined">close</span>
              </button>
            </div>

            {/* Tabs */}
            <div style={{ display: 'flex', gap: '4px', padding: '12px 24px 0', borderBottom: '1px solid var(--line)', overflowX: 'auto', flexShrink: 0 }}>
              {TABS.filter(t => !t.admin || currentUser.isAdmin).map(t => (
                <button
                  key={t.id}
                  onClick={() => { setTab(t.id); setMsg(''); }}
                  style={{
                    display: 'flex', alignItems: 'center', gap: '6px',
                    padding: '8px 14px', border: 'none', cursor: 'pointer',
                    borderRadius: '8px 8px 0 0', fontSize: '.82rem', fontWeight: 600,
                    whiteSpace: 'nowrap',
                    background: tab === t.id ? 'var(--primary)' : 'transparent',
                    color: tab === t.id ? '#fff' : 'var(--muted)',
                    borderBottom: tab === t.id ? '2px solid var(--primary)' : '2px solid transparent',
                    transition: 'all .15s'
                  }}
                >
                  <span className="material-symbols-outlined" style={{ fontSize: '16px' }}>{t.icon}</span>
                  {t.label}
                </button>
              ))}
            </div>

            {/* Content */}
            <div className="settings-modal-inner" style={{ flex: 1, overflowY: 'auto', padding: '20px 24px' }}>
              {msg && <div style={{ marginBottom: '12px', padding: '8px 14px', background: 'rgba(51,204,204,.1)', border: '1px solid rgba(51,204,204,.3)', borderRadius: '8px', fontSize: '.85rem', color: 'var(--primary)', fontWeight: 600 }}>{msg}</div>}

              {/* ===== PERFIL ===== */}
              {tab === 'perfil' && (
                <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap', alignItems: 'flex-start' }}>
                  <div style={{ flex: 1, minWidth: '260px' }}>
                    <div style={{ marginBottom: '16px' }}>
                      <label style={labelStyle}>Foto de Perfil</label>
                      <input type="file" accept="image/*" onChange={handleFileChange} style={{ fontSize: '.85rem' }} />
                    </div>
                    <button className="btn btn-primary" onClick={salvarPerfil}>Atualizar Foto</button>
                  </div>
                  <div style={{ textAlign: 'center' }}>
                    <img src={previewUrl || 'https://ui-avatars.com/api/?name=U&background=33CCCC&color=fff'} loading="lazy" style={{ width: '100px', height: '100px', borderRadius: '12px', objectFit: 'cover', border: '2px solid var(--line)' }} />
                  </div>
                </div>
              )}

              {/* ===== SENHA ===== */}
              {tab === 'senha' && (
                <div style={{ maxWidth: '380px', display: 'flex', flexDirection: 'column', gap: '14px' }}>
                  {!currentUser.isAdmin && (
                    <div>
                      <label style={labelStyle}>Senha Atual</label>
                      <input type="password" style={inputStyle} value={senhaAtual} onChange={e => setSenhaAtual(e.target.value)} />
                    </div>
                  )}
                  <div>
                    <label style={labelStyle}>Nova Senha</label>
                    <input type="password" style={inputStyle} value={novaSenha} onChange={e => setNovaSenha(e.target.value)} />
                  </div>
                  <div>
                    <label style={labelStyle}>Confirmar Nova Senha</label>
                    <input type="password" style={inputStyle} value={confSenha} onChange={e => setConfSenha(e.target.value)} />
                  </div>
                  <button className="btn btn-primary" style={{ alignSelf: 'flex-start' }} onClick={trocarSenha}>Alterar Senha</button>
                </div>
              )}

              {/* ===== COLABORADORES ===== */}
              {tab === 'colaboradores' && (
                <div style={{ display: 'flex', gap: '20px', flexWrap: 'wrap' }}>
                  <div style={{ minWidth: '280px', flex: '0 0 280px' }}>
                    <h4 style={{ margin: '0 0 12px', fontSize: '.9rem' }}>{formColab.id ? 'Editar' : 'Novo'} Colaborador</h4>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                      <div><label style={labelStyle}>Nome*</label><input style={inputStyle} value={formColab.nome} onChange={e => setFormColab(p => ({ ...p, nome: e.target.value }))} /></div>
                      <div><label style={labelStyle}>Email*</label><input style={inputStyle} value={formColab.email} onChange={e => setFormColab(p => ({ ...p, email: e.target.value }))} /></div>
                      <div>
                        <label style={labelStyle}>Nível Hierárquico*</label>
                        <select style={inputStyle} value={formColab.nivelHierarquia} onChange={e => setFormColab(p => ({ ...p, nivelHierarquia: e.target.value }))}>
                          <option value="">Selecione...</option>
                          {hierarquia.map(h => <option key={h.Id || h.id} value={h.Id || h.id}>{h.Id || h.id} — {h.Descricao || h.descricao}</option>)}
                        </select>
                      </div>
                      <div>
                        <label style={labelStyle}>Área</label>
                        <select style={inputStyle} value={formColab.areaId} onChange={e => setFormColab(p => ({ ...p, areaId: e.target.value }))}>
                          <option value="">Selecione...</option>
                          {areas.filter(a => a.ativo !== false).map(a => <option key={a.id} value={a.id}>{a.nome}</option>)}
                        </select>
                      </div>
                      <div>
                        <label style={labelStyle}>Cargo</label>
                        <select style={inputStyle} value={formColab.cargoId} onChange={e => setFormColab(p => ({ ...p, cargoId: e.target.value }))}>
                          <option value="">Selecione...</option>
                          {cargos.map(c => <option key={c.Id || c.id} value={c.Id || c.id}>{c.Nome || c.nome}</option>)}
                        </select>
                      </div>
                      <div>
                        <label style={labelStyle}>Gestor Direto</label>
                        <select style={inputStyle} value={formColab.gestorId} onChange={e => setFormColab(p => ({ ...p, gestorId: e.target.value }))}>
                          <option value="">Nenhum (topo)</option>
                          {colaboradores.filter(c => c.id !== formColab.id).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                      </div>
                      <div style={{ display: 'flex', gap: '8px', marginTop: '4px' }}>
                        <button className="btn btn-primary" style={{ flex: 1 }} onClick={saveColab}>Salvar</button>
                        {formColab.id && <button className="btn btn-secondary" onClick={() => setFormColab({ id: null, nome: '', email: '', nivelHierarquia: '', areaId: '', cargoId: '', gestorId: '' })}>Cancelar</button>}
                      </div>
                    </div>
                  </div>
                  <div style={{ flex: 1, minWidth: '280px', overflowX: 'auto' }}>
                    <table className="admin-table">
                      <thead><tr><th>Nome</th><th>Nível</th><th>Área</th><th>Gestor</th><th>Ativo</th><th>Ações</th></tr></thead>
                      <tbody>
                        {colaboradores.slice().sort((a, b) => (a.nivelHierarquia || 99) - (b.nivelHierarquia || 99) || (a.name || '').localeCompare(b.name || '')).map(c => {
                          const gestor = colaboradores.find(g => g.id === (c.gestorId || c.GestorId));
                          return (
                            <tr key={c.id} style={{ opacity: c.ativo === false ? 0.5 : 1 }}>
                              <td style={{ fontWeight: 600 }}>{c.name}</td>
                              <td><span style={{ background: 'rgba(51,204,204,.12)', color: 'var(--primary)', borderRadius: '10px', padding: '1px 7px', fontSize: '.75rem', fontWeight: 700 }}>N{c.nivelHierarquia || '?'}</span></td>
                              <td style={{ fontSize: '.8rem', color: 'var(--muted)' }}>{c.areaNome || '—'}</td>
                              <td style={{ fontSize: '.8rem' }}>{gestor ? gestor.name : <span style={{ color: 'var(--muted)' }}>— Topo</span>}</td>
                              <td><span style={{ fontSize: '.75rem', fontWeight: 600, color: c.ativo !== false ? '#10b981' : '#ef4444' }}>{c.ativo !== false ? 'Ativo' : 'Inativo'}</span></td>
                              <td style={{ display: 'flex', gap: '4px' }}>
                                <button className="admin-action-btn" onClick={() => setFormColab({ id: c.id, nome: c.name, email: c.email || '', nivelHierarquia: c.nivelHierarquia || '', areaId: c.AreaId || c.areaId || '', cargoId: c.CargoId || c.cargoId || '', gestorId: c.gestorId || c.GestorId || '' })}>Editar</button>
                                <button className="admin-action-btn" onClick={() => toggleColabAtivo(c)} style={{ color: c.ativo !== false ? '#f59e0b' : '#10b981', borderColor: c.ativo !== false ? '#f59e0b' : '#10b981' }}>{c.ativo !== false ? 'Inativar' : 'Reativar'}</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* ===== ÁREAS ===== */}
              {tab === 'areas' && (
                <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                  <div style={{ minWidth: '260px', flex: '0 0 260px' }}>
                    <h4 style={{ margin: '0 0 12px', fontSize: '.9rem' }}>{formArea.id ? 'Editar' : 'Nova'} Área</h4>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                      <div>
                        <label style={labelStyle}>Nome da Área*</label>
                        <input style={inputStyle} value={formArea.nome} onChange={e => setFormArea(p => ({ ...p, nome: e.target.value }))} placeholder="Ex: Controladoria" />
                      </div>
                      <div style={{ display: 'flex', gap: '10px', alignItems: 'flex-end' }}>
                        <div style={{ flex: 1 }}>
                          <label style={labelStyle}>Cor de Identificação</label>
                          <input type="color" value={formArea.cor || '#33CCCC'} onChange={e => setFormArea(p => ({ ...p, cor: e.target.value }))} style={{ width: '100%', height: '36px', borderRadius: '6px', cursor: 'pointer', border: '1px solid var(--line)' }} />
                        </div>
                        <div style={{ padding: '8px 14px', borderRadius: '8px', background: formArea.cor || '#33CCCC', color: '#fff', fontSize: '.75rem', fontWeight: 700, marginBottom: '1px', opacity: 0.9 }}>
                          {formArea.nome || 'Prévia'}
                        </div>
                      </div>
                      <div style={{ display: 'flex', gap: '8px', marginTop: '4px' }}>
                        <button className="btn btn-primary" style={{ flex: 1 }} onClick={saveArea}>Salvar</button>
                        {formArea.id && <button className="btn btn-secondary" onClick={() => setFormArea({ id: null, nome: '', cor: '#33CCCC' })}>Cancelar</button>}
                      </div>
                    </div>
                    <div style={{ marginTop: '16px', padding: '10px', background: 'rgba(51,204,204,.06)', borderRadius: '8px', fontSize: '.8rem', color: 'var(--muted)', border: '1px solid rgba(51,204,204,.2)' }}>
                      <strong>Dica:</strong> Áreas com colaboradores ativos não podem ser excluídas. Inative-as para preservar os registros históricos.
                    </div>
                  </div>
                  <div style={{ flex: 1, minWidth: '280px', overflowX: 'auto' }}>
                    <table className="admin-table">
                      <thead><tr><th>Cor</th><th>Área</th><th>Colaboradores</th><th>Ativo</th><th>Ações</th></tr></thead>
                      <tbody>
                        {areas.map(a => {
                          const count = colaboradores.filter(c => (c.AreaId || c.areaId) === a.id && c.ativo !== false).length;
                          return (
                            <tr key={a.id} style={{ opacity: a.ativo === false ? 0.45 : 1 }}>
                              <td><span style={{ display: 'inline-block', width: '14px', height: '14px', borderRadius: '50%', background: a.cor || '#33CCCC', verticalAlign: 'middle' }} /></td>
                              <td style={{ fontWeight: 600 }}>{a.nome}</td>
                              <td style={{ fontSize: '.8rem', color: 'var(--muted)' }}>{count} colaborador(es)</td>
                              <td><span style={{ fontSize: '.75rem', fontWeight: 600, color: a.ativo !== false ? '#10b981' : '#ef4444' }}>{a.ativo !== false ? 'Ativa' : 'Inativa'}</span></td>
                              <td style={{ display: 'flex', gap: '4px' }}>
                                <button className="admin-action-btn" onClick={() => setFormArea({ id: a.id, nome: a.nome, cor: a.cor || '#33CCCC' })}>Editar</button>
                                <button className="admin-action-btn" onClick={() => toggleAreaAtivo(a)} style={{ color: a.ativo !== false ? '#f59e0b' : '#10b981', borderColor: a.ativo !== false ? '#f59e0b' : '#10b981' }}>{a.ativo !== false ? 'Inativar' : 'Reativar'}</button>
                                <button className="admin-action-btn danger" onClick={async () => {
                                  if (!confirm(`Excluir área "${a.nome}"? Isso não pode ser desfeito.`)) return;
                                  try {
                                    const res = await fetch(`${API_BASE}/api/areas/${a.id}`, { method: 'DELETE', headers: headers() });
                                    const d = await res.json();
                                    if (!res.ok) { alert(d.error); return; }
                                    fetchAll(); setMsg('Área excluída!');
                                  } catch (e) { alert(e.message); }
                                }}>Excluir</button>
                              </td>
                            </tr>
                          );
                        })}
                        {areas.length === 0 && <tr><td colSpan={5} style={{ textAlign: 'center', color: 'var(--muted)', padding: '20px', fontSize: '.85rem' }}>Nenhuma área cadastrada.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* ===== CARGOS ===== */}
              {tab === 'cargos' && (
                <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                  <div style={{ minWidth: '240px', flex: '0 0 240px' }}>
                    <h4 style={{ margin: '0 0 12px', fontSize: '.9rem' }}>{formCargo.id ? 'Editar' : 'Novo'} Cargo</h4>
                    <div><label style={labelStyle}>Nome do Cargo*</label><input style={inputStyle} value={formCargo.nome} onChange={e => setFormCargo(p => ({ ...p, nome: e.target.value }))} placeholder="Ex: Analista Sênior" /></div>
                    <div style={{ display: 'flex', gap: '8px', marginTop: '12px' }}>
                      <button className="btn btn-primary" style={{ flex: 1 }} onClick={saveCargo}>Salvar</button>
                      {formCargo.id && <button className="btn btn-secondary" onClick={() => setFormCargo({ id: null, nome: '' })}>Cancelar</button>}
                    </div>
                  </div>
                  <div style={{ flex: 1, minWidth: '280px' }}>
                    <table className="admin-table">
                      <thead><tr><th>Cargo</th><th>Ações</th></tr></thead>
                      <tbody>
                        {cargos.map(c => (
                          <tr key={c.Id || c.id}>
                            <td style={{ fontWeight: 500 }}>{c.Nome || c.nome}</td>
                            <td style={{ display: 'flex', gap: '4px' }}>
                              <button className="admin-action-btn" onClick={() => setFormCargo({ id: c.Id || c.id, nome: c.Nome || c.nome })}>Editar</button>
                              <button className="admin-action-btn danger" onClick={() => deleteCargo(c)}>Excluir</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* ===== HIERARQUIA ===== */}
              {tab === 'hierarquia' && (
                <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                  <div style={{ minWidth: '260px', flex: '0 0 260px' }}>
                    <h4 style={{ margin: '0 0 12px', fontSize: '.9rem' }}>{formNivel.id ? 'Editar' : 'Novo'} Nível</h4>
                    <div><label style={labelStyle}>Descrição do Nível*</label><input style={inputStyle} value={formNivel.descricao} onChange={e => setFormNivel(p => ({ ...p, descricao: e.target.value }))} placeholder="Ex: Gerente Executivo" /></div>
                    <div style={{ display: 'flex', gap: '8px', marginTop: '12px' }}>
                      <button className="btn btn-primary" style={{ flex: 1 }} onClick={saveNivel}>Salvar</button>
                      {formNivel.id && <button className="btn btn-secondary" onClick={() => setFormNivel({ id: null, descricao: '' })}>Cancelar</button>}
                    </div>
                    <div style={{ marginTop: '16px', padding: '10px', background: 'rgba(51,204,204,.06)', borderRadius: '8px', fontSize: '.8rem', color: 'var(--muted)', border: '1px solid rgba(51,204,204,.2)' }}>
                      <strong>Dica:</strong> O ID do nível define a hierarquia. Níveis menores têm mais autoridade. Ao excluir, colaboradores vinculados devem ser re-atribuídos primeiro.
                    </div>
                  </div>
                  <div style={{ flex: 1, minWidth: '280px' }}>
                    <table className="admin-table">
                      <thead><tr><th>ID</th><th>Descrição</th><th>Colaboradores</th><th>Ações</th></tr></thead>
                      <tbody>
                        {hierarquia.map(h => {
                          const count = colaboradores.filter(c => String(c.nivelHierarquia) === String(h.Id || h.id)).length;
                          return (
                            <tr key={h.Id || h.id}>
                              <td><span style={{ background: 'rgba(51,204,204,.12)', color: 'var(--primary)', borderRadius: '10px', padding: '2px 8px', fontWeight: 700, fontSize: '.8rem' }}>N{h.Id || h.id}</span></td>
                              <td style={{ fontWeight: 500 }}>{h.Descricao || h.descricao}</td>
                              <td style={{ fontSize: '.8rem', color: 'var(--muted)' }}>{count} pessoa(s)</td>
                              <td style={{ display: 'flex', gap: '4px' }}>
                                <button className="admin-action-btn" onClick={() => setFormNivel({ id: h.Id || h.id, descricao: h.Descricao || h.descricao })}>Editar</button>
                                <button className="admin-action-btn danger" onClick={() => deleteNivel(h)}>Excluir</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* ===== STATUS ===== */}
              {tab === 'status' && (
                <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                  <div style={{ minWidth: '280px', flex: '0 0 280px' }}>
                    <h4 style={{ margin: '0 0 12px', fontSize: '.9rem' }}>{formStatus.id ? 'Editar' : 'Novo'} Status</h4>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                      <div><label style={labelStyle}>Nome do Status*</label><input style={inputStyle} value={formStatus.nome} onChange={e => setFormStatus(p => ({ ...p, nome: e.target.value }))} placeholder="Ex: Em Revisão" /></div>
                      <div style={{ display: 'flex', gap: '10px', alignItems: 'flex-end' }}>
                        <div style={{ flex: 1 }}>
                          <label style={labelStyle}>Cor</label>
                          <input type="color" value={formStatus.cor} onChange={e => setFormStatus(p => ({ ...p, cor: e.target.value }))} style={{ width: '100%', height: '36px', borderRadius: '6px', cursor: 'pointer', border: '1px solid var(--line)' }} />
                        </div>
                        <div style={{ flex: 2 }}>
                          <label style={labelStyle}>Aplica-se a</label>
                          <select style={inputStyle} value={formStatus.aplicacao} onChange={e => setFormStatus(p => ({ ...p, aplicacao: e.target.value }))}>
                            {APLICACAO_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                          </select>
                        </div>
                      </div>
                      <div><label style={labelStyle}>Ordem de exibição</label><input type="number" style={inputStyle} value={formStatus.ordem} onChange={e => setFormStatus(p => ({ ...p, ordem: parseInt(e.target.value) || 99 }))} /></div>
                      <div style={{ display: 'flex', gap: '8px', marginTop: '4px' }}>
                        <button className="btn btn-primary" style={{ flex: 1 }} onClick={saveStatus}>Salvar</button>
                        {formStatus.id && <button className="btn btn-secondary" onClick={() => setFormStatus({ id: null, nome: '', cor: '#c4c4c4', aplicacao: 'Ambos', ordem: 99 })}>Cancelar</button>}
                      </div>
                    </div>
                    <div style={{ marginTop: '16px', padding: '10px', background: 'rgba(245,158,11,.06)', borderRadius: '8px', fontSize: '.8rem', color: 'var(--muted)', border: '1px solid rgba(245,158,11,.2)' }}>
                      <strong>Nota:</strong> Os status padrão do sistema (Não Iniciado, Em Andamento, etc.) continuam ativos. Os status criados aqui complementam o sistema.
                    </div>
                  </div>
                  <div style={{ flex: 1, minWidth: '300px' }}>
                    <table className="admin-table">
                      <thead><tr><th>Status</th><th>Cor</th><th>Aplica-se a</th><th>Ordem</th><th>Ativo</th><th>Ações</th></tr></thead>
                      <tbody>
                        {statusTipos.map(s => (
                          <tr key={s.Id || s.id} style={{ opacity: s.Ativo === false || s.Ativo === 0 ? 0.5 : 1 }}>
                            <td style={{ fontWeight: 600, display: 'flex', alignItems: 'center', gap: '8px' }}>
                              <span style={{ width: '12px', height: '12px', borderRadius: '50%', background: s.Cor || '#c4c4c4', flexShrink: 0, display: 'inline-block' }}></span>
                              {s.Nome || s.nome}
                            </td>
                            <td><span style={{ fontFamily: 'monospace', fontSize: '.8rem' }}>{s.Cor}</span></td>
                            <td style={{ fontSize: '.8rem' }}>{s.Aplicacao}</td>
                            <td style={{ fontSize: '.8rem', textAlign: 'center' }}>{s.Ordem}</td>
                            <td><span style={{ fontSize: '.75rem', fontWeight: 600, color: s.Ativo !== false && s.Ativo !== 0 ? '#10b981' : '#ef4444' }}>{s.Ativo !== false && s.Ativo !== 0 ? 'Ativo' : 'Inativo'}</span></td>
                            <td style={{ display: 'flex', gap: '4px' }}>
                              <button className="admin-action-btn" onClick={() => setFormStatus({ id: s.Id || s.id, nome: s.Nome || s.nome, cor: s.Cor || '#c4c4c4', aplicacao: s.Aplicacao || 'Ambos', ordem: s.Ordem || 99 })}>Editar</button>
                              <button className="admin-action-btn" onClick={() => toggleStatusAtivo(s)} style={{ color: s.Ativo !== false ? '#f59e0b' : '#10b981', borderColor: s.Ativo !== false ? '#f59e0b' : '#10b981' }}>{s.Ativo !== false ? 'Inativar' : 'Ativar'}</button>
                              <button className="admin-action-btn danger" onClick={() => deleteStatus(s)}>Excluir</button>
                            </td>
                          </tr>
                        ))}
                        {statusTipos.length === 0 && <tr><td colSpan={6} style={{ textAlign: 'center', color: 'var(--muted)', padding: '20px', fontSize: '.85rem' }}>Nenhum status personalizado cadastrado.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* ===== EVENTOS ===== */}
              {tab === 'eventos' && (
                <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap' }}>
                  <div style={{ minWidth: '280px', flex: '0 0 280px' }}>
                    <h4 style={{ margin: '0 0 12px', fontSize: '.9rem' }}>{formEvento.id ? 'Editar' : 'Novo'} Evento</h4>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                      <div><label style={labelStyle}>Título*</label><input style={inputStyle} value={formEvento.titulo} onChange={e => setFormEvento(p => ({ ...p, titulo: e.target.value }))} placeholder="Ex: Reunião Executiva Mensal" /></div>
                      <div>
                        <label style={labelStyle}>Tipo de Evento</label>
                        <select style={inputStyle} value={formEvento.tipo} onChange={e => setFormEvento(p => ({ ...p, tipo: e.target.value }))}>
                          {TIPO_EVENTO_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                      </div>
                      <div><label style={labelStyle}>Data/Hora de Início*</label><input type="datetime-local" style={inputStyle} value={formEvento.dataInicio} onChange={e => setFormEvento(p => ({ ...p, dataInicio: e.target.value }))} /></div>
                      <div><label style={labelStyle}>Data/Hora de Término</label><input type="datetime-local" style={inputStyle} value={formEvento.dataFim} onChange={e => setFormEvento(p => ({ ...p, dataFim: e.target.value }))} /></div>
                      <div><label style={labelStyle}>Descrição / Pauta</label><textarea style={{ ...inputStyle, minHeight: '70px', resize: 'vertical' }} value={formEvento.descricao} onChange={e => setFormEvento(p => ({ ...p, descricao: e.target.value }))} placeholder="Pauta, participantes, observações..." /></div>
                      <div style={{ display: 'flex', gap: '8px', marginTop: '4px' }}>
                        <button className="btn btn-primary" style={{ flex: 1 }} onClick={saveEvento}>Salvar Evento</button>
                        {formEvento.id && <button className="btn btn-secondary" onClick={() => setFormEvento({ id: null, titulo: '', descricao: '', dataInicio: '', dataFim: '', tipo: 'Reunião' })}>Cancelar</button>}
                      </div>
                    </div>
                  </div>
                  <div style={{ flex: 1, minWidth: '320px' }}>
                    <table className="admin-table">
                      <thead><tr><th>Evento</th><th>Tipo</th><th>Início</th><th>Término</th><th>Ações</th></tr></thead>
                      <tbody>
                        {eventos.map(ev => (
                          <tr key={ev.Id || ev.id}>
                            <td style={{ fontWeight: 600 }}>
                              {ev.Titulo || ev.titulo}
                              {(ev.Descricao || ev.descricao) && <div style={{ fontSize: '.75rem', color: 'var(--muted)', fontWeight: 400 }}>{(ev.Descricao || ev.descricao).substring(0, 60)}{(ev.Descricao || ev.descricao).length > 60 ? '...' : ''}</div>}
                            </td>
                            <td style={{ fontSize: '.8rem' }}>{ev.Tipo || ev.tipo}</td>
                            <td style={{ fontSize: '.8rem' }}>{ev.dataInicio ? new Date(ev.dataInicio).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : '—'}</td>
                            <td style={{ fontSize: '.8rem' }}>{ev.dataFim ? new Date(ev.dataFim).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : '—'}</td>
                            <td style={{ display: 'flex', gap: '4px' }}>
                              <button className="admin-action-btn" onClick={() => setFormEvento({ id: ev.Id || ev.id, titulo: ev.Titulo || ev.titulo, descricao: ev.Descricao || ev.descricao || '', dataInicio: ev.dataInicio || '', dataFim: ev.dataFim || '', tipo: ev.Tipo || ev.tipo || 'Reunião' })}>Editar</button>
                              <button className="admin-action-btn danger" onClick={() => deleteEvento(ev)}>Excluir</button>
                            </td>
                          </tr>
                        ))}
                        {eventos.length === 0 && <tr><td colSpan={5} style={{ textAlign: 'center', color: 'var(--muted)', padding: '20px', fontSize: '.85rem' }}>Nenhum evento cadastrado.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

            </div>{/* /settings-modal-inner */}

            <div style={{ padding: '12px 24px', borderTop: '1px solid var(--line)', textAlign: 'right', flexShrink: 0 }}>
              <button className="btn btn-secondary" onClick={onClose}>Fechar</button>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    if (ReactDOM.createRoot) {
      ReactDOM.createRoot(rootElement).render(<App />);
    } else {
      ReactDOM.render(<App />, rootElement);
    }

  </script>
</body>

</html>
