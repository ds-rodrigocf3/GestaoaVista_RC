<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' blob:; style-src * 'unsafe-inline';">
  <title>Superintendência de Finanças</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ===== USER BADGE — evita sobreposição com logout ===== */
    .user-badge {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .user-badge-content {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(51, 204, 204, .06);
      border: 1px solid rgba(51, 204, 204, .15);
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s;
    }
    .user-badge-content:hover { background: rgba(51, 204, 204, .12); }
    .logout-btn {
      margin-top: 6px;
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: .8rem;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.08);
      color: #ef4444;
      border-color: #ef4444;
    }

    /* ===== LOGIN / AUTH OVERLAY ===== */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999
    }

    .login-card {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 64px rgba(0, 0, 0, .5)
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center
    }

    .login-logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #33CCCC, #0ea5e9);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px
    }

    .login-logo h1 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      margin: 0
    }

    .login-logo p {
      color: rgba(255, 255, 255, .5);
      font-size: .8rem;
      margin: 2px 0 0
    }

    .login-field {
      margin-bottom: 20px
    }

    .login-field label {
      display: block;
      color: rgba(255, 255, 255, .7);
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: 8px
    }

    .login-field input {
      width: 100%;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
      transition: border .2s
    }

    .login-field input:focus {
      border-color: #33CCCC
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #33CCCC, #0ea5e9);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s
    }

    .login-btn:hover {
      opacity: .9
    }

    .login-error {
      color: #f87171;
      font-size: .85rem;
      margin-top: 10px;
      text-align: center;
      min-height: 20px
    }

    .user-badge {
      display: flex;
      flex-direction: column;    /* Empilha vertical: badge info + botão sair */
      gap: 0;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      overflow: hidden;          /* Evita barra horizontal */
    }

    .user-badge-content {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(51, 204, 204, .06);
      border: 1px solid rgba(51, 204, 204, .15);
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s;
      min-width: 0;              /* Respeita limites do container */
    }

    .user-badge-content:hover { background: rgba(51, 204, 204, .12); }

    .user-badge-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0
    }

    .user-badge-info {
      flex: 1;
      overflow: hidden
    }

    .user-badge-name {
      font-size: .8rem;
      font-weight: 600;
      color: var(--title);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .user-badge-role {
      font-size: .7rem;
      color: var(--muted)
    }

    /* ===== SETTINGS MODAL ===== */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .settings-modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 0;
      width: 100%;
      max-width: 1000px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, .3);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .settings-modal h2 {
      margin: 0 0 4px;
      font-size: 1.2rem
    }

    .settings-modal p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: .875rem
    }

    .settings-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px
    }

    .settings-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      background: transparent;
      color: var(--muted)
    }

    .settings-tab.active {
      background: var(--primary);
      color: #fff
    }

    /* ===== ADMIN TABLE ===== */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
      background: var(--surface);
    }

    .admin-table th {
      text-align: left;
      padding: 14px 12px;
      color: var(--title);
      font-size: .7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 2px solid var(--line);
      background: var(--table-header-bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      color: var(--text);
    }

    .admin-table td:last-child {
      white-space: nowrap;
      text-align: right;
    }

    .admin-table tr:hover td {
      background: rgba(51, 204, 204, .04);
    }

    .admin-action-btn {
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .admin-action-btn:hover {
      background: var(--line);
      border-color: var(--primary);
      color: var(--primary);
    }

    .admin-action-btn.danger:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }

    .admin-action-btn.danger {
      color: #ef4444;
      border-color: #ef444440
    }

    .admin-action-btn.danger:hover {
      background: rgba(239, 68, 68, .08);
      border-color: #ef4444
    }

    /* ===== PRESENCE CARDS ===== */
    .presence-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 12px
    }

    .presence-card {
      border-radius: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .presence-card.presencial {
      border-color: #10b981;
      background: rgba(16, 185, 129, .06)
    }

    .presence-card.homeoffice {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, .06)
    }

    .presence-card.ausente {
      border-color: #f59e0b;
      background: rgba(245, 158, 11, .06)
    }

    .presence-card-name {
      font-size: .8rem;
      font-weight: 600;
      color: var(--title)
    }

    .presence-card-label {
      font-size: .72rem;
      color: var(--muted)
    }

    /* ===== DEMAND ROWS ===== */
    .demand-section {
      margin-bottom: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden
    }

    .demand-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg);
      cursor: pointer;
      user-select: none
    }

    .demand-header:hover {
      background: rgba(51, 204, 204, .06)
    }

    .demand-badge {
      font-size: .72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(51, 204, 204, .15);
      color: var(--primary)
    }

    .demand-tasks {
      border-top: 1px solid var(--line)
    }

    /* ===== STATUS HISTORY ===== */
    .history-timeline {
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .history-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line)
    }

    .history-item:last-child {
      border-bottom: none
    }

    .history-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
      margin-top: 4px
    }

    .history-content {
      flex: 1;
      font-size: .85rem
    }

    .history-from-to {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: var(--title)
    }

    .history-arrow {
      color: var(--muted);
      font-size: .8rem
    }

    .history-comment {
      color: var(--muted);
      margin-top: 2px;
      font-style: italic
    }

    .history-date {
      color: var(--muted);
      font-size: .75rem;
      margin-top: 2px
    }

    /* ===== FILTER SELECTORS ===== */
    .multi-filter-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 0
    }

    .filter-select-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 180px
    }

    .filter-select-group label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted)
    }

    .filter-select-group select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      background: var(--surface);
      color: var(--text);
      font-size: .875rem
    }

    /* ===== STATUS COMMENT MODAL ===== */
    .status-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 7000;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .settings-modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 0;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 16px 32px rgba(0, 0, 0, .2);
      border: 1px solid var(--line);
      position: relative;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
    }

    .settings-modal-inner {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    .status-modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 16px 32px rgba(0, 0, 0, .2);
      border: 1px solid var(--line)
    }

    .status-modal h3 {
      margin: 0 0 6px;
      font-size: 1rem
    }

    .status-modal p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: .85rem
    }

    .status-modal textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font-size: .875rem;
      min-height: 80px;
      resize: vertical;
      box-sizing: border-box;
      background: var(--surface);
      color: var(--text)
    }

    .status-modal .action-row {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      justify-content: flex-end
    }

    /* ===== SIDEBAR MOBILE — DESLIZANTE VERTICAL ===== */
    @media (max-width: 1024px) {
      /* App shell vira coluna única */
      .app-shell {
        display: grid !important;
        grid-template-columns: 1fr !important;
      }

      /* Sidebar se torna painel fixo fora da tela */
      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 280px !important;
        max-width: 85vw !important;
        height: 100vh !important;
        z-index: 9995 !important;
        transform: translateX(-100%) !important;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        box-shadow: 4px 0 32px rgba(0,0,0,0.18) !important;
        flex-direction: column !important;  /* Sempre coluna */
        overflow-y: auto !important;
        overflow-x: hidden !important;
        padding: 24px 18px !important;
        border-right: 1px solid var(--line) !important;
        border-bottom: none !important;
        white-space: normal !important;     /* Texto quebra linha normalmente */
      }

      /* Quando aberto, desliza para dentro */
      .sidebar.open {
        transform: translateX(0) !important;
      }

      /* Marca da empresa — visível na sidebar mobile */
      .brand {
        display: flex !important;
        margin-bottom: 20px !important;
      }

      /* Nav list sempre vertical */
      .nav-list {
        display: flex !important;
        flex-direction: column !important;  /* VERTICAL */
        gap: 4px !important;
        width: 100% !important;
        overflow-x: hidden !important;
      }

      /* Botões de nav ocupam largura total */
      .nav-button {
        width: 100% !important;
        padding: 11px 14px !important;
        border-radius: 12px !important;
        white-space: nowrap !important;
        display: flex !important;
        flex-direction: row !important;     /* Ícone + texto lado a lado */
        align-items: center !important;
        gap: 12px !important;
        margin-bottom: 0 !important;
        background: transparent !important;
        border: none !important;
      }

      .nav-button.active {
        background: linear-gradient(90deg, rgba(51,204,204,0.12) 0%, rgba(51,204,204,0.02) 100%) !important;
        border-right: 3px solid var(--primary) !important;
        border-radius: 12px 4px 4px 12px !important;
      }

      /* Título e caption dos nav buttons — visíveis */
      .nav-button .nav-title {
        font-size: 0.9rem !important;
        display: block !important;
        font-weight: 700 !important;
      }

      .nav-button .nav-caption {
        display: block !important;
        font-size: 0.7rem !important;
        color: var(--muted) !important;
      }

      .nav-button span.material-symbols-outlined {
        font-size: 20px !important;
        margin: 0 !important;
        flex-shrink: 0 !important;
      }

      /* User badge fica no fim da sidebar (margin-top: auto) */
      .user-badge {
        margin-top: auto !important;
        margin-left: 0 !important;
      }

      /* Conteúdo principal ocupa tela toda */
      .main-content {
        padding: 16px !important;
      }

      .dashboard-grid {
        grid-template-columns: 1fr !important;
      }

      .executive-kpi-grid {
        grid-template-columns: 1fr 1fr !important;
      }
    }

    @media (max-width: 768px) {
      .executive-kpi-grid {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }

      .top-filters {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 16px !important;
        padding: 16px !important;
      }

      .top-filters select {
        width: 100% !important;
      }

      .workload-grid {
        grid-template-columns: 1fr !important;
      }

      .dash-bento-grid {
        display: flex !important;
        flex-direction: column !important;
      }

      .main {
        padding: 20px !important;
      }

      .topbar {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 20px !important;
      }

      .topbar .segmented-control {
        width: 100% !important;
      }

      .topbar button {
        flex: 1 !important;
        justify-content: center !important;
      }

      /* Melhora o scroll de tabelas no mobile */
      .horizontal-scroll-container {
        margin: 0 -20px !important;
        padding: 0 20px 10px 20px !important;
        width: calc(100% + 40px) !important;
      }

      .custom-table {
        font-size: 0.8rem !important;
      }

      .custom-table th, .custom-table td {
        padding: 8px 10px !important;
      }
    }

    .executive-kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .kpi-card-exec {
      background: var(--surface);
      border-left: 4px solid var(--primary);
      padding: 24px;
      border-radius: 8px 12px 12px 8px;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .04);
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .kpi-card-exec.danger {
      border-left-color: #ef4444;
    }

    .kpi-card-exec.warning {
      border-left-color: #f59e0b;
    }

    .kpi-title-exec {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .kpi-value-exec {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--title);
      line-height: 1;
      margin-bottom: 8px;
    }

    .kpi-desc-exec {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .exec-section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--title);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .top-filters {
      display: flex;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      align-items: center;
      margin-bottom: 24px;
      border-radius: 12px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }

    .top-filters::-webkit-scrollbar {
      height: 4px;
    }

    .top-filters::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 4px;
    }

    .top-filters .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-filters label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ===== RESIZABLE COLUMNS & MODALS ===== */
    .resizable-th {
      position: relative;
      user-select: none;
      font-weight: 700;
      color: var(--title);
      font-size: 0.8rem;
      letter-spacing: -0.01em;
      white-space: nowrap;
      text-transform: none;
    }
    .resizer {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 6px;
      background: transparent;
      cursor: col-resize;
      z-index: 10;
      transition: background 0.2s;
    }
    .resizer:hover, .resizer.resizing {
      background: var(--primary);
      opacity: 0.5;
    }
    
    .modern-table {
      table-layout: fixed;
      width: 100%;
    }
    
    .modern-table.resizing {
      width: max-content;
    }
    
    .modern-table td {
      padding: 8px 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.8rem;
    }
    
    .resizable-modal {
      display: flex;
      flex-direction: column;
      position: relative !important;
    }
    .modal-resizer {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 15px;
      height: 15px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, var(--primary) 50%);
      border-radius: 0 0 12px 0;
      z-index: 100;
    }

    /* ===== SEARCHABLE SELECT (INTELLISENSE) ===== */
    .searchable-select-container {
      position: relative;
      width: 100%;
    }
    .searchable-select-input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);

      padding: 8px 12px;
      background: var(--bg);
      border-radius: 8px;

      color: #fff;
      background: var(--primary);

      border: 1px solid var(--line);
