                    <ResizableHeader label="Cronograma" width={taskColWidths.dates} onResize={w => setTaskColWidths(c => ({ ...c, dates: w }))} className="text-center" />
                    <th style={{ width: '100px', fontSize: '.7rem', textAlign: 'center', color: 'var(--muted)' }}>Dias Úteis</th>
                    <ResizableHeader label="Ações" width={taskColWidths.actions} onResize={w => setTaskColWidths(c => ({ ...c, actions: w }))} className="text-center" />
                  </tr>
                </thead>
                <tbody>
                  {filteredTasks
                    .filter(task => !selectedDemandaId || task.demandaId === selectedDemandaId)
                    .map(task => {
                      const availableDays = calculateAvailableDays(task.ownerId, task.startDate, task.endDate);
                      const isOverloaded = task.startDate && task.endDate && availableDays === 0;
                      const emp = dbEmployees?.find(e => e.id === task.ownerId) || dbEmployees?.[0] || {};

                      return (
                        <tr key={task.id} style={{ borderBottom: '1px solid var(--line)' }}>
                          <td style={{ padding: '8px 12px' }}>
                            <input
                              type="text"
                              value={task.title}
                              onChange={(e) => updateTask(task.id, 'title', e.target.value)}
                              className="monday-input"
                              placeholder="Título..."
                              style={{ width: '100%', border: 'none', background: 'transparent', outline: 'none', fontWeight: 500 }}
                            />
                          </td>
                          <td style={{ padding: '8px 12px' }}>
                            <select
                              value={task.demandaId || ''}
                              onChange={e => updateTask(task.id, 'demandaId', e.target.value ? Number(e.target.value) : null)}
                              className="monday-select"
                              style={{ width: '100%', border: '1px solid var(--line)', borderRadius: '6px', fontSize: '.75rem', padding: '4px' }}
                            >
                              <option value="">Sem demanda</option>
                              {(demandas || []).map(d => <option key={d.Id || d.id} value={d.Id || d.id}>{d.Titulo || d.titulo}</option>)}
                            </select>
                          </td>
                          <td style={{ padding: '8px 12px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                              {emp?.AvatarUrl || emp?.avatarUrl ?
                                <img src={emp?.AvatarUrl || emp?.avatarUrl} loading="lazy" style={{ width: '20px', height: '20px', borderRadius: '50%', objectFit: 'cover' }} /> :
                                <div style={{ width: '20px', height: '20px', borderRadius: '50%', background: emp?.color || 'var(--primary)' }}></div>}
                              <select
                                value={task.ownerId}
                                onChange={(e) => updateTask(task.id, 'ownerId', Number(e.target.value))}
                                className="monday-select"
                                style={{ flex: 1, border: '1px solid var(--line)', borderRadius: '6px', fontSize: '.75rem', padding: '4px' }}
                              >
                                {dbEmployees?.map(e => (
                                  <option key={e.id} value={e.id}>{e.name}</option>
                                ))}
                              </select>
                            </div>
                          </td>
                          <td style={{ padding: '8px 12px', textAlign: 'center' }}>
                            <select
                              className="status-pill-select"
                              value={task.priority}
                              onChange={e => updateTask(task.id, 'priority', e.target.value)}
                              style={{ ...prioritySelectStyle(task.priority), padding: '4px 8px', fontSize: '.7rem' }}
                            >
                              {priorities.map(p => <option key={p} value={p} style={{ background: '#fff', color: '#333' }}>{p}</option>)}
                            </select>
                          </td>
                          <td style={{ padding: '8px 12px', textAlign: 'center' }}>
                            <select
                              className="status-pill-select"
                              value={task.status}
                              onChange={e => handleStatusChange(task, e.target.value)}
                              style={{ ...statusSelectStyle(task.status), padding: '4px 8px', fontSize: '.7rem' }}
                            >
                              {statuses.map(s => <option key={s} value={s} style={{ background: '#fff', color: '#333' }}>{s}</option>)}
                            </select>
                          </td>
                          <td style={{ padding: '8px 12px', textAlign: 'center' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '4px', justifyContent: 'center' }}>
                              <input type="date" value={task.startDate} onChange={(e) => updateTask(task.id, 'startDate', e.target.value)} style={{ border: '1px solid var(--line)', borderRadius: '4px', padding: '2px', fontSize: '.75rem' }} />
                              <span style={{ color: 'var(--muted)' }}>-</span>
                              <input type="date" value={task.endDate} onChange={(e) => updateTask(task.id, 'endDate', e.target.value)} style={{ border: '1px solid var(--line)', borderRadius: '4px', padding: '2px', fontSize: '.75rem' }} />
                            </div>
                          </td>
                          <td style={{ padding: '8px 12px', textAlign: 'center' }}>
                            {task.startDate && task.endDate ? (
                              <span className={`badge ${isOverloaded ? 'badge-danger' : 'badge-primary'}`} style={{ fontWeight: 700, fontSize: '.7rem' }}>
                                {availableDays} dias
                              </span>
                            ) : '-'}
                          </td>
                          <td style={{ padding: '8px 12px', textAlign: 'center' }}>
                            <button className="delete-btn" onClick={() => deleteTask(task.id)} style={{ padding: '4px', borderRadius: '4px' }}>
                              <span className="material-symbols-outlined" style={{ fontSize: '18px' }}>delete</span>
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                </tbody>
              </table>
            </div>
          )}

        </div>
      );
    }

    function DashboardView({ stats, requests, pendingRequests, rejectedRequests, timelineItems, tasks, workDays, employees, demandas, setDemandas, globalFilters }) {

      if (!employees || employees.length === 0) {
        return (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '300px', gap: '12px' }}>
            <div className="modern-spinner"></div>
            <p style={{ color: 'var(--muted)', fontSize: '.9rem' }}>Sincronizando dados operativos...</p>
          </div>
        );
      }
      const subordinateIds = React.useMemo(() => {
        if (!globalFilters?.gestorId) return null;
        const getSubIds = (managerId) => {
          const direct = (employees || []).filter(item => String(item.gestorId) === String(managerId));
          let all = direct.map(item => item.id);
          direct.forEach(sub => {
            all = [...all, ...getSubIds(sub.id)];
          });
          return Array.from(new Set(all));
        };
        return [parseInt(globalFilters.gestorId), ...getSubIds(globalFilters.gestorId)];
      }, [globalFilters?.gestorId, employees]);

      const isMatch = (e) => {
        if (!e) return false;
        const g = globalFilters || {};
        const colabId = g.colaboradorId ? String(g.colaboradorId) : null;
        if (colabId && String(e.id) !== colabId) return false;

        if (subordinateIds) {
          if (!subordinateIds.includes(parseInt(e.id))) return false;
        } else if (g.gestor) {
          if (e.areaNome !== g.gestor && e.manager !== g.gestor) return false;
        }

        if (g.cargo && e.teamStr !== g.cargo && e.team !== g.cargo && e.cargoNome !== g.cargo) return false;
        return true;
      };

      const filteredEmployees = React.useMemo(() => {
        if (!employees) return [];
        return employees
          .filter(e => e && e.name)
          .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
          .filter(isMatch);
      }, [employees, globalFilters]);

      const empIds = React.useMemo(() => new Set(filteredEmployees.map(e => e.id)), [filteredEmployees]);

      const scopedTasks = React.useMemo(() => tasks ? tasks.filter(t => t && empIds.has(t.ownerId)) : [], [tasks, empIds]);
      const scopedRequests = React.useMemo(() => requests ? requests.filter(r => empIds.has(r.employeeId) && r.status !== 'Rejeitado') : [], [requests, empIds]);

      const scopedWorkDays = React.useMemo(() => {
        const obj = {};
        if (workDays) {
          Object.keys(workDays).forEach(key => {
            if (empIds.has(Number(key))) obj[key] = workDays[key];
          });
        }
        return obj;
      }, [workDays, empIds]);

      const priorityMap = {
        'Crítica': '#e2445c',
        'Alta': '#784bd1',
        'Média': '#579bfc',
        'Baixa': '#c4c4c4'
      };

      const kpis = React.useMemo(() => {
        const total = scopedTasks.length;
        const done = scopedTasks.filter(t => t.status === 'Concluído').length;
        const deliveryRate = total > 0 ? Math.round((done / total) * 100) : 0;
        return { total, done, deliveryRate };
      }, [scopedTasks]);

      // Tabela 360 Groups
      const grupos360 = React.useMemo(() => {
        const baseTasks = (scopedTasks || []);
        const criticas = baseTasks.filter(t => t.status === 'Bloqueio' || t.status === 'Cancelado');
        const emAndamento = baseTasks.filter(t => t.status === 'Em Andamento');
        const pausadas = baseTasks.filter(t => t.status === 'Pausado');
        const backlog = baseTasks.filter(t => t.status === 'Não Iniciado');

        const attachDetails = (list) => (list || []).map(t => {
          if (!t) return null;
          const emp = (employees || []).find(e => e && e.id === Number(t.ownerId));
          const dem = (demandas || []).find(d => d && (d.Id || d.id) === t.demandaId);
          return {
            ...t,
            emp: emp || { name: 'Sem Responsável', team: 'N/A' },
            demandaNome: dem ? (dem.Titulo || dem.titulo || 'Demanda') : 'Demanda não identificada',
            corPrioridade: (priorityMap && t.priority) ? (priorityMap[t.priority] || '#c4c4c4') : '#c4c4c4'
          };
        }).filter(Boolean);

        return {
          criticas: attachDetails(criticas).sort((a, b) => new Date(a.endDate || 0) - new Date(b.endDate || 0)),
          emAndamento: attachDetails(emAndamento).sort((a, b) => new Date(a.endDate || 0) - new Date(b.endDate || 0)),
          pausadas: attachDetails(pausadas).sort((a, b) => new Date(a.endDate || 0) - new Date(b.endDate || 0)),
          backlog: attachDetails(backlog).sort((a, b) => new Date(a.endDate || 0) - new Date(b.endDate || 0))
        };
      }, [scopedTasks, employees, demandas]);

      // Grid 7 Dias (Datas)
      const proximos7Dias = React.useMemo(() => {
        const dias = [];
        const base = new Date();
        base.setHours(0, 0, 0, 0);
        let current = new Date(base);
        for (let i = 0; i < 7; i++) {
          dias.push(new Date(current));
          current.setDate(current.getDate() + 1);
        }
        return dias;
      }, []);

      const getStatusDia = (empId, dateObj) => {
        if (!dateObj || isNaN(dateObj.getTime())) return { type: 'pendente', icon: 'help_outline', color: 'var(--line)', title: 'Indisponível' };
        const dStr = dateObj.toISOString().split('T')[0];
        const request = (scopedRequests || []).find(r => {
          if (!r || r.employeeId !== empId) return false;
          const type = r.type || '';
          if (type === 'Escala de Trabalho' || type === 'Banco de horas') return false;
          const s = new Date((r.startDate || '') + 'T00:00:00');
          const e = new Date((r.endDate || '') + 'T00:00:00');
          return dateObj >= s && dateObj <= e;
        });
        if (request) {
          const rt = request.type || '';
          if (rt.includes('Férias')) return { type: 'ferias', icon: 'beach_access', color: '#f59e0b', title: rt };
          if (rt.includes('Saúde')) return { type: 'saude', icon: 'medical_services', color: '#ef4444', title: rt };
          return { type: 'ausencia', icon: 'event_busy', color: '#f59e0b', title: rt };
        }
        // Prioridade 2: Escala
        const workDay = scopedWorkDays[empId] && scopedWorkDays[empId][dStr];
        if (workDay === 'Presencial') return { type: 'presencial', icon: 'check_circle', color: '#10b981', title: 'Presencial' };
        if (workDay === 'Home Office') return { type: 'homeoffice', icon: 'home', color: 'var(--muted)', title: 'Home Office' };

        const dw = dateObj.getDay();
        if (dw === 0 || dw === 6) return { type: 'fds', icon: 'weekend', color: 'var(--line)', title: 'Fim de Semana' };
        return { type: 'pendente', icon: 'help_outline', color: 'var(--line)', title: 'Não informado' };
      };

      const STATUS_COLORS = {
        'Não Iniciado': { bg: '#c4c4c4', color: '#555' },
        'Em Andamento': { bg: '#fdab3d', color: '#fff' },
        'Concluído':    { bg: '#00b461', color: '#fff' },
        'Pausado':      { bg: '#579bfc', color: '#fff' },
        'Bloqueio':     { bg: '#e2445c', color: '#fff' },
        'Cancelado':    { bg: '#94a3b8', color: '#fff' },
        'Pendente':     { bg: '#a78bfa', color: '#fff' },
        'Backlog':      { bg: '#64748b', color: '#fff' },
        'Crítico':      { bg: '#e2445c', color: '#fff' },
      };

      const workloadMap = React.useMemo(() => {
        return filteredEmployees.map(e => {
          const tarefasAtivas = scopedTasks.filter(t => t.ownerId === e.id && t.status !== 'Cancelado');
          const tarefasPendentes = tarefasAtivas.filter(t => t.status !== 'Concluído');
          const uniqueDemands = new Set(tarefasPendentes.map(t => t.demandaId).filter(id => id !== null));
          // Contagem dinâmica por status (todos os status presentes)
          const statusCount = {};
          tarefasAtivas.forEach(t => {
            if (t.status) statusCount[t.status] = (statusCount[t.status] || 0) + 1;
          });
          return {
            emp: e,
            taskCount: tarefasPendentes.length,
            demandaCount: uniqueDemands.size,
            statusCount,
          };
        }).sort((a, b) => b.taskCount - a.taskCount).slice(0, 50);
      }, [filteredEmployees, scopedTasks]);

      const timelineAusencias = React.useMemo(() => {
        const todayStr = new Date().toISOString().split('T')[0];
        return (scopedRequests || [])
          .filter(r => r && r.status === 'Aprovado' && r.type !== 'Escala de Trabalho' && r.type !== 'Banco de horas' && r.endDate >= todayStr)
          .map(r => ({
            ...r,
            emp: (employees || []).find(e => e && e.id === r.employeeId)
          }))
          .sort((a, b) => new Date(a.startDate || 0) - new Date(b.startDate || 0))
          .slice(0, 10);
      }, [scopedRequests, employees]);

      const formatDia = (d) => d.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit' }).replace('.,', '').toUpperCase();

      return (
        <div style={{ animation: 'fadeIn 0.4s ease-out' }}>
          <div style={{ marginBottom: '24px' }}>
            <h2 style={{ fontSize: 'clamp(1.5rem, 2vw, 1.8rem)', fontWeight: 800, color: 'var(--title)' }}>Visão Executiva 360º</h2>
            <p style={{ color: 'var(--muted)', fontSize: '0.9rem', marginTop: '4px' }}>
              Painel de alta densidade: Acompanhamento de fila, sobrecarga e escala tática.
            </p>
          </div>

          <div className="dash-inline-kpis">
            <div className="dash-micro-badge">
              <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--muted)' }}>inventory_2</span>
              <span>Total: <strong>{kpis.total}</strong></span>
            </div>
            <div className="dash-micro-badge" style={{ background: 'rgba(51,204,204,0.08)', borderColor: 'rgba(51,204,204,0.3)' }}>
              <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--primary)' }}>task_alt</span>
              <span style={{ color: 'var(--primary)' }}>Entrega: <strong>{kpis.deliveryRate}%</strong></span>
            </div>
            <div className="dash-micro-badge">
              <span className="material-symbols-outlined" style={{ fontSize: '18px', color: 'var(--muted)' }}>done_all</span>
              <span>Finalizadas: <strong>{kpis.done}</strong></span>
            </div>
          </div>

          <div className="dash-bento-grid" style={{ gap: '24px' }}>
            <div className="dash-panel" style={{ gridColumn: 'span 12' }}>
              <div className="dash-header" style={{ marginBottom: '16px' }}>
                <h3><span className="material-symbols-outlined icon-teal">table</span> Fila Operacional (Gestão 360)</h3>
              </div>

              <div className="dash-360-container">
                <div className="dash-360-col">
                  <div className="dash-360-header crit">
                    <span>⚠️ Críticas & Bloqueios</span>
                    <span>{grupos360.criticas.length}</span>
                  </div>
                  {grupos360.criticas.length === 0 ? <p className="helper">Sem registros.</p> :
                    grupos360.criticas.map(t => (
                      <div className="dash-360-card crit" key={'c' + t.id} style={{ borderLeftColor: t.corPrioridade, background: t.corPrioridade + '15' }}>
                        <div style={{ fontSize: '.7rem', color: 'var(--muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.02em', marginBottom: '4px' }}>{t.demandaNome}</div>
                        <div style={{ fontWeight: 600, fontSize: '.85rem', color: 'var(--title)' }}>{t.title}</div>
                        <div className="dash-360-meta">
                          <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                            {t.emp?.avatarUrl ? <img src={t.emp.avatarUrl} className="dash-360-avatar" /> : <div className="dash-360-avatar" style={{ background: '#ef4444' }}>{(t.emp?.name || 'A').charAt(0).toUpperCase()}</div>}
                            <span style={{ textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap', maxWidth: '100px' }}>
                              {t.emp?.name?.split(' ')[0] || '-'}
                            </span>
                          </div>
                          <span style={{ color: t.corPrioridade, fontWeight: 700 }}>
                            {t.endDate ? t.endDate.split('-').reverse().slice(0, 2).join('/') : '-'}
                          </span>
                        </div>
                      </div>
                    ))
                  }
                </div>

                <div className="dash-360-col">
                  <div className="dash-360-header">
                    <span>Em Andamento</span>
                    <span>{grupos360.emAndamento.length}</span>
                  </div>
                  {grupos360.emAndamento.length === 0 ? <p className="helper">Sem registros.</p> :
                    grupos360.emAndamento.map(t => (
                      <div className="dash-360-card" key={'a' + t.id} style={{ borderLeftColor: t.corPrioridade, background: t.corPrioridade + '10' }}>
                        <div style={{ fontSize: '.7rem', color: 'var(--muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.02em', marginBottom: '4px' }}>{t.demandaNome}</div>
                        <div style={{ fontWeight: 600, fontSize: '.85rem', color: 'var(--title)' }}>{t.title}</div>
                        <div className="dash-360-meta">
                          <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                            {t.emp?.avatarUrl ? <img src={t.emp.avatarUrl} className="dash-360-avatar" /> : <div className="dash-360-avatar">{(t.emp?.name || 'A').charAt(0).toUpperCase()}</div>}
                            <span style={{ textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap', maxWidth: '100px' }}>
                              {t.emp?.name?.split(' ')[0] || '-'}
                            </span>
                          </div>
                          <span style={{ color: t.corPrioridade, fontWeight: 700 }}>{t.endDate ? t.endDate.split('-').reverse().slice(0, 2).join('/') : '-'}</span>
                        </div>
                      </div>
                    ))
                  }
                </div>

                <div className="dash-360-col">
                  <div className="dash-360-header">
                    <span>Pausadas</span>
                    <span>{grupos360.pausadas.length}</span>
                  </div>
                  {grupos360.pausadas.length === 0 ? <p className="helper">Sem registros.</p> :
                    grupos360.pausadas.map(t => (
                      <div className="dash-360-card" key={'p' + t.id} style={{ borderLeftColor: t.corPrioridade, background: t.corPrioridade + '08' }}>
                        <div style={{ fontSize: '.7rem', color: 'var(--muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.02em', marginBottom: '4px' }}>{t.demandaNome}</div>
                        <div style={{ fontWeight: 600, fontSize: '.85rem', color: 'var(--title)' }}>{t.title}</div>
                        <div className="dash-360-meta">
                          <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                            {t.emp?.avatarUrl ? <img src={t.emp.avatarUrl} className="dash-360-avatar" /> : <div className="dash-360-avatar">{(t.emp?.name || 'A').charAt(0).toUpperCase()}</div>}
                            <span style={{ textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap', maxWidth: '100px' }}>
                              {t.emp?.name?.split(' ')[0] || '-'}
                            </span>
                          </div>
                          <span style={{ color: t.corPrioridade, fontWeight: 700 }}>{t.endDate ? t.endDate.split('-').reverse().slice(0, 2).join('/') : '-'}</span>
                        </div>
                      </div>
                    ))
                  }
                </div>

                <div className="dash-360-col">
                  <div className="dash-360-header">
                    <span>Backlog</span>
                    <span>{grupos360.backlog.length}</span>
                  </div>
                  {grupos360.backlog.length === 0 ? <p className="helper">Sem registros.</p> :
                    grupos360.backlog.map(t => (
                      <div className="dash-360-card" key={'b' + t.id} style={{ borderLeftColor: t.corPrioridade, background: t.corPrioridade + '08' }}>
                        <div style={{ fontSize: '.7rem', color: 'var(--muted)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.02em', marginBottom: '4px' }}>{t.demandaNome}</div>
                        <div style={{ fontWeight: 600, fontSize: '.85rem', color: 'var(--title)' }}>{t.title}</div>
                        <div className="dash-360-meta">
                          <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                            {t.emp?.avatarUrl ? <img src={t.emp.avatarUrl} className="dash-360-avatar" /> : <div className="dash-360-avatar">{(t.emp?.name || 'A').charAt(0).toUpperCase()}</div>}
                            <span style={{ textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap', maxWidth: '100px' }}>
                              {t.emp?.name?.split(' ')[0] || '-'}
                            </span>
                          </div>
                          <span style={{ color: t.corPrioridade, fontWeight: 700 }}>{t.endDate ? t.endDate.split('-').reverse().slice(0, 2).join('/') : '-'}</span>
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>

            <div className="dash-panel" style={{ gridColumn: 'span 12' }}>
              <div className="dash-header" style={{ marginBottom: '16px' }}>
                <h3><span className="material-symbols-outlined icon-blue">calendar_month</span> Mapa de Escala (Próximos 7 Dias)</h3>
              </div>

              {filteredEmployees.length === 0 ? (
                <div className="empty-state">Nenhum colaborador corresponde aos filtros.</div>
              ) : (
                <div className="grid-7d-wrapper">
                  <table className="grid-7d-table">
                    <thead>
                      <tr>
                        <th>Colaborador</th>
                        {proximos7Dias.map((d, i) => (
                          <th key={i}>{formatDia(d)}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {filteredEmployees.map(emp => (
                        <tr key={emp.id}>
                          <td style={{ fontWeight: 600, color: 'var(--text)' }}>{emp.name}</td>
                          {proximos7Dias.map((d, i) => {
                            const st = getStatusDia(emp.id, d);
                            return (
                              <td key={i} title={st.title}>
                                <span className="material-symbols-outlined grid-7d-cell-icon" style={{ color: st.color }}>
                                  {st.icon}
